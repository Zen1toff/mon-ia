<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dragon Slot - Simulation</title>
    <style>
        body { background: #1a0033; color: white; font-family: Arial, sans-serif; text-align: center; }
        .machine { background: #4b0082; border: 5px solid #ffd700; border-radius: 15px; display: inline-block; padding: 20px; margin-top: 50px; box-shadow: 0 0 20px #ff00ff; }
        .reels { display: flex; gap: 10px; margin-bottom: 20px; }
        .reel { background: #fff; color: #000; width: 80px; height: 80px; line-height: 80px; font-size: 40px; border-radius: 10px; border: 2px solid #ffd700; }
        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { background: linear-gradient(#ff0000, #8b0000); color: white; border: none; padding: 10px 30px; font-size: 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        .stats { font-size: 24px; margin: 15px; color: #00ff00; }
        .bet-selector { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🐉 DRAGON GOLD SLOT 🐉</h1>
    
    <div class="stats">Solde: <span id="balance">100000</span> €</div>

    <div class="machine">
        <div class="reels">
            <div id="reel1" class="reel">🐲</div>
            <div id="reel2" class="reel">🐲</div>
            <div id="reel3" class="reel">🐲</div>
        </div>

        <div class="controls">
            <div class="bet-selector">
                Mise: 
                <select id="betAmount">
                    <option value="0.75">0.75 €</option>
                    <option value="5">5.00 €</option>
                    <option value="10">10.00 €</option>
                    <option value="100">100.00 €</option>
                </select>
            </div>
            <button id="spinBtn" onclick="spin()">LANCER !</button>
        </div>
    </div>

    <p id="message"></p>

    <script>
        let balance = 100000;
        const symbols = ['🐲', '💎', '🔥', '🧧', '7️⃣'];
        const reelElements = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];

        function spin() {
            const bet = parseFloat(document.getElementById('betAmount').value);
            const message = document.getElementById('message');

            if (balance < bet) {
                message.innerText = "Solde insuffisant !";
                return;
            }

            // Déduction de la mise
            balance -= bet;
            updateUI();
            
            document.getElementById('spinBtn').disabled = true;
            message.innerText = "Le dragon tourne...";

            // Animation simple
            let count = 0;
            const interval = setInterval(() => {
                reelElements.forEach(reel => {
                    reel.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                });
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    determineResult(bet);
                }
            }, 100);
        }

        function determineResult(bet) {
            const results = reelElements.map(reel => reel.innerText);
            const message = document.getElementById('message');
            document.getElementById('spinBtn').disabled = false;

            if (results[0] === results[1] && results[1] === results[2]) {
                let win = bet * 10; // Gain de 10x la mise
                balance += win;
                message.innerHTML = `<span style="color:gold; font-size:24px;">JACKPOT ! +${win} €</span>`;
            } else if (results[0] === results[1] || results[1] === results[2]) {
                let win = bet * 2; // Petit gain
                balance += win;
                message.innerText = `Petit gain: +${win} €`;
            } else {
                message.innerText = "Réessayez !";
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
        }
    </script>
</body>
</html>
