<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spy-Cam IA : Bio-Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; color: #ff3300; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; border-left: 2px solid #ff3300; padding-left: 15px; background: rgba(0,0,0,0.5); }
        .mode-selector { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        button { padding: 15px 25px; background: none; border: 1px solid #ff3300; color: #ff3300; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        button:hover { background: #ff3300; color: #000; }
        #video-preview { position: absolute; bottom: 10px; right: 10px; width: 150px; border: 1px solid #ff3300; display: none; }
        canvas { display: block; filter: saturate(1.5) contrast(1.2); }
    </style>
</head>
<body>

<div id="ui">
    [ SYSTEM: <span id="sys-status">OFFLINE</span> ]<br>
    [ SIGNAL: <span id="sig-strength">0%</span> ]<br>
    [ TARGET: <span id="target-id">UNKNOWN</span> ]
</div>

<video id="video-preview" autoplay playsinline muted></video>

<div class="mode-selector" id="setup">
    <button onclick="initPC()">ACTIVER STATION PC</button>
    <button onclick="initMobile()">ACTIVER CAPTEUR MOBILE</button>
</div>

<script>
    const SESSION_ID = "spy-net-77"; // Identifiant de liaison
    let peer, conn;
    const sysStatus = document.getElementById('sys-status');

    // --- LOGIQUE 3D (PC) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Création d'un "Squelette" de points
    const pointsGroup = new THREE.Group();
    const dots = [];
    for(let i=0; i<33; i++) {
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.08, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xff3300 })
        );
        dots.push(dot);
        pointsGroup.add(dot);
    }
    scene.add(pointsGroup);
    camera.position.z = 3;

    function updateSkeleton(landmarks) {
        landmarks.forEach((lm, i) => {
            dots[i].position.set((lm.x - 0.5) * 4, (lm.y - 0.5) * -4, lm.z * 2);
        });
    }

    // --- LOGIQUE RÉSEAU & IA ---
    function initPC() {
        document.getElementById('setup').style.display = 'none';
        peer = new Peer(SESSION_ID);
        sysStatus.innerText = "WAITING FOR CAPTURE...";
        
        peer.on('connection', (c) => {
            conn = c;
            sysStatus.innerText = "LINK ESTABLISHED";
            document.getElementById('target-id').innerText = "HUMAN_01";
            conn.on('data', (data) => updateSkeleton(data));
        });
    }

    async function initMobile() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('video-preview').style.display = 'block';
        sysStatus.innerText = "CONNECTING TO STATION...";

        peer = new Peer();
        conn = peer.connect(SESSION_ID);

        // Configuration MediaPipe Pose
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });
        pose.onResults((results) => {
            if (results.poseLandmarks && conn.open) {
                conn.send(results.poseLandmarks);
            }
        });

        const videoElement = document.getElementById('video-preview');
        const cameraPipe = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480, facingMode: "environment"
        });
        cameraPipe.start();

        conn.on('open', () => {
            sysStatus.innerText = "TRANSMITTING DATA...";
            document.getElementById('sig-strength').innerText = "100%";
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
