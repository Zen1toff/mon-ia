<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sideswipe HTML Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            color: white; font-size: 2rem; font-weight: bold; pointer-events: none;
        }
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 50px;
        }
        .btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border: 2px solid white; color: white; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            user-select: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="scoreBlue">0</div>
    <div style="color: #ff3b30;">SIDESWIPE</div>
    <div id="scoreRed">0</div>
</div>

<div id="controls">
    <div class="btn" id="jumpBtn">SAUT</div>
    <div class="btn" id="boostBtn" style="background: rgba(255, 60, 0, 0.5);">BOOST</div>
</div>

<script>
// --- CONFIGURATION MATTER.JS ---
const { Engine, Render, Runner, Bodies, Composite, Body, Vector, Events } = Matter;

const engine = Engine.create();
const world = engine.world;
engine.gravity.y = 1.2; // Pesanteur forte comme Sideswipe

const width = window.innerWidth;
const height = window.innerHeight;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: width,
        height: height,
        wireframes: false,
        background: 'linear-gradient(180deg, #1a1a2e 0%, #16213e 100%)'
    }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// --- CRÉATION DE L'ARÈNE ---
const ground = Bodies.rectangle(width/2, height, width, 60, { isStatic: true, render: { fillStyle: '#333' } });
const ceiling = Bodies.rectangle(width/2, 0, width, 60, { isStatic: true, render: { fillStyle: '#333' } });
const leftWall = Bodies.rectangle(0, height/2, 60, height, { isStatic: true });
const rightWall = Bodies.rectangle(width, height/2, 60, height, { isStatic: true });

// Buts (Zones sensorielles)
const goalWidth = 100;
const goalHeight = 250;
const leftGoal = Bodies.rectangle(30, height - goalHeight/2 - 30, 20, goalHeight, { isStatic: true, isSensor: true, render: { fillStyle: '#007aff' } });
const rightGoal = Bodies.rectangle(width - 30, height - goalHeight/2 - 30, 20, goalHeight, { isStatic: true, isSensor: true, render: { fillStyle: '#ff3b30' } });

Composite.add(world, [ground, ceiling, leftWall, rightWall, leftGoal, rightGoal]);

// --- LA BALLE (Physique rebondissante) ---
const ball = Bodies.circle(width/2, height/2, 35, {
    restitution: 0.9, // Rebond élevé
    friction: 0.005,
    density: 0.001,
    render: { fillStyle: '#fff', strokeStyle: '#000', lineWidth: 2 }
});
Composite.add(world, ball);

// --- LA VOITURE ---
const car = Bodies.rectangle(width/4, height - 100, 80, 40, {
    restitution: 0.3,
    friction: 0.1,
    density: 0.02,
    chamfer: { radius: 10 },
    render: { fillStyle: '#007aff' }
});
Composite.add(world, car);

// --- LOGIQUE DE JEU ---
let scoreB = 0;
let scoreR = 0;
const keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Contrôles tactiles / Boutons
document.getElementById('jumpBtn').addEventListener('touchstart', jump);
document.getElementById('boostBtn').addEventListener('touchstart', () => keys['Boost'] = true);
document.getElementById('boostBtn').addEventListener('touchend', () => keys['Boost'] = false);

function jump() {
    Body.applyForce(car, car.position, { x: 0, y: -0.8 });
}

function resetBall() {
    Body.setPosition(ball, { x: width/2, y: height/2 });
    Body.setVelocity(ball, { x: 0, y: 0 });
}

// --- BOUCLE DE MISE À JOUR ---
Events.on(engine, 'beforeUpdate', () => {
    // Déplacement latéral (Touches Flèches ou A/D)
    if (keys['ArrowLeft'] || keys['KeyA']) {
        Body.translate(car, { x: -7, y: 0 });
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        Body.translate(car, { x: 7, y: 0 });
    }
    
    // Saut (Espace)
    if (keys['Space']) {
        jump();
        keys['Space'] = false; // Empêcher le vol infini
    }

    // Boost (Shift ou Bouton Boost)
    if (keys['ShiftLeft'] || keys['Boost']) {
        const force = 0.02;
        const angle = car.angle;
        Body.applyForce(car, car.position, { 
            x: Math.cos(angle) * force * 5, 
            y: Math.sin(angle) * force 
        });
    }

    // Stabilisation de la voiture (pour qu'elle ne reste pas sur le toit)
    if (Math.abs(car.angle) > 0.1) {
        Body.setAngle(car, car.angle * 0.95);
    }

    // Vérification des buts
    if (Matter.Collision.collides(ball, leftGoal)) {
        scoreR++;
        document.getElementById('scoreRed').innerText = scoreR;
        resetBall();
    }
    if (Matter.Collision.collides(ball, rightGoal)) {
        scoreB++;
        document.getElementById('scoreBlue').innerText = scoreB;
        resetBall();
    }
});

// Ajustement fenêtre
window.addEventListener('resize', () => {
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;
});
</script>

</body>
</html>
