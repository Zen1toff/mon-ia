<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASTRO_FIX_v2</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; font-family: monospace; color: #00ff41; }
        #debug-console { position: fixed; top: 10px; left: 10px; z-index: 1000; font-size: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #00ff41; pointer-events: none; }
        #btn-start { position: fixed; inset: 0; z-index: 2000; background: #000; color: #00ff41; border: 4px solid #00ff41; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="btn-start" onclick="initSystem()">
        CLIQUE ICI POUR<br>DÉPLOYER L'ANALYSEUR
    </div>

    <div id="debug-console">
        > SYSTEM_BOOT...<br>
        > WAITING_FOR_USER_ACTION...
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity id="sky-map">
            <a-sphere id="sun-obj" radius="4" color="yellow" material="shader: flat;"></a-sphere>
            <a-sphere id="moon-obj" radius="3" material="src: https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/space/moon_1024.jpg;"></a-sphere>
        </a-entity>
        <a-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const log = (msg) => { document.getElementById('debug-console').innerHTML += `<br>> ${msg}`; };

        async function initSystem() {
            document.getElementById('btn-start').style.display = 'none';
            log("INITIALIZING...");

            // 1. Autoriser l'orientation (iPhone)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    log("PERMISSION_ORIENTATION: " + permission);
                } catch (e) { log("ERR_ORIENTATION: " + e); }
            }

            // 2. Lancer le GPS
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    log(`GPS_FIX: ${lat.toFixed(2)}, ${lon.toFixed(2)}`);
                    startAstro(lat, lon);
                },
                (err) => { log("ERR_GPS: " + err.message); },
                { enableHighAccuracy: true }
            );
        }

        function startAstro(lat, lon) {
            setInterval(() => {
                const now = new Date();
                const sun = SunCalc.getPosition(now, lat, lon);
                const moon = SunCalc.getMoonPosition(now, lat, lon);

                updatePos('sun-obj', sun.azimuth, sun.altitude, 50);
                updatePos('moon-obj', moon.azimuth, moon.altitude, 40);
                log("ASTRO_UPDATE_SUCCESS");
            }, 2000);
        }

        function updatePos(id, az, alt, dist) {
            const el = document.getElementById(id);
            const x = dist * Math.cos(alt) * Math.sin(az);
            const y = dist * Math.sin(alt);
            const z = -dist * Math.cos(alt) * Math.cos(az);
            el.setAttribute('position', `${x} ${y} ${z}`);
        }
    </script>
</body>
</html>
