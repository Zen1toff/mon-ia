<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Vision Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #status { position: absolute; top: 10px; left: 10px; color: #ff3300; z-index: 20; font-size: 10px; text-shadow: 1px 1px black; }
    </style>
</head>
<body>

<div id="status">SCANNER INITIALISATION...</div>
<video id="video" autoplay playsinline muted style="display:none;"></video>
<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    let model;

    async function startApp() {
        try {
            // 1. Charger le modèle ultra-léger pour le direct
            model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
            status.innerText = "IA PRÊTE. ACCÈS CAMÉRA...";

            // 2. Configurer la caméra arrière de l'iPhone
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                status.innerText = "SCAN EN DIRECT : ACTIF";
                render();
            };
        } catch (e) {
            status.innerText = "ERREUR : " + e.message;
        }
    }

    function render() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Dessiner l'image caméra
        ctx.drawImage(video, 0, 0);

        // Appliquer l'analyse IA
        model.detect(video).then(predictions => {
            // Effet de grain/bruit Matrix
            ctx.fillStyle = "rgba(255, 60, 0, 0.15)";
            
            predictions.forEach(p => {
                const [x, y, w, h] = p.bbox;

                // 1. Zone de détection (L'effet orange de ta photo)
                ctx.fillStyle = "rgba(255, 100, 0, 0.3)";
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = "#ff3300";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);

                // 2. Chiffres qui flottent (Coordonnées dynamiques)
                ctx.fillStyle = "white";
                ctx.font = "bold 12px monospace";
                ctx.fillText(`ID_${Math.floor(x+y)}`, x + 5, y + 15);
                ctx.fillText(`VAL:${(p.score).toFixed(4)}`, x + 5, y + 30);
                
                // Lignes de connexion vers le centre (style HUD)
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x-20, y-20);
                ctx.stroke();
            });

            // 3. Scan global (petits points partout)
            for(let i=0; i<30; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? "#ff3300" : "#ffffff";
                const sx = Math.random() * canvas.width;
                const sy = Math.random() * canvas.height;
                ctx.fillRect(sx, sy, 1, 1);
                if(Math.random() > 0.95) ctx.fillText(Math.floor(Math.random()*9999), sx, sy);
            }
        });

        requestAnimationFrame(render);
    }

    // Lancer au clic pour éviter les blocages iOS
    document.body.onclick = () => {
        if(!model) startApp();
    };
    
    status.innerText = "TOUCHEZ L'ÉCRAN POUR LANCER LE SCAN";
</script>
</body>
</html>
