<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA QUANTUM SCANNER v7.2 // FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/deeplab"></script>

    <style>
        :root { --hacker-cyan: #00ffff; --hacker-bg: #000; }
        body { margin: 0; background: var(--hacker-bg); overflow: hidden; font-family: 'Courier New', monospace; color: white; text-transform: uppercase; }
        
        /* Loading Screen */
        #loading-screen { position: fixed; inset: 0; background: var(--hacker-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid var(--hacker-cyan); }
        .glitch { animation: glitch 1s infinite; color: var(--hacker-cyan); text-align: center; padding: 20px; }
        @keyframes glitch { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* UI */
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; visibility: hidden; }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 10; pointer-events: none; }
        #status { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 10px; border-left: 3px solid var(--hacker-cyan); font-size: 10px; z-index: 100; }
        button { margin-top: 20px; padding: 15px 30px; background: none; border: 1px solid var(--hacker-cyan); color: var(--hacker-cyan); cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="glitch" id="load-text">> SYSTEM_OFFLINE<br>READY_TO_DEPLOY</div>
    <button onclick="main()" id="start-btn">DEPLOY_QUANTUM_CORE</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="status" style="visibility: hidden;">
    [ SYSTEM: <span style="color:#0f0">ONLINE</span> ]<br>
    [ MODEL: DEEPLAB_V3_MOBILE ]<br>
    [ SCAN: <span id="data-count">0</span> OBJ_DETECTED ]
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loadText = document.getElementById('load-text');
    let model;

    async function main() {
        document.getElementById('start-btn').style.display = 'none';
        loadText.innerHTML = "> LOADING_MODEL...<br>PLEASE_WAIT";
        
        try {
            // Utilisation du modèle 'pascal' qui est plus stable sur mobile
            model = await deeplab.load({ base: 'pascal', quantizationBytes: 2 });
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                document.getElementById('loading-screen').style.display = 'none';
                video.style.visibility = 'visible';
                canvas.style.visibility = 'visible';
                document.getElementById('status').style.visibility = 'visible';
                predict();
            };
        } catch (e) {
            loadText.innerHTML = `<span style="color:red">> ERROR: ${e.message}</span>`;
        }
    }

    async function predict() {
        const prediction = await model.segment(video);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        const imgData = ctx.createImageData(prediction.width, prediction.height);
        for (let i = 0; i < prediction.legend.length; i++) {
            const rgb = prediction.legend[i];
            const mask = prediction.mask[i];
            mask.forEach(idx => {
                imgData.data[idx*4] = rgb[0];
                imgData.data[idx*4+1] = rgb[1];
                imgData.data[idx*4+2] = rgb[2];
                imgData.data[idx*4+3] = 150;
            });
        }
        ctx.putImageData(imgData, 0, 0);

        // Dessiner les noms des objets
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Courier New";
        Object.keys(prediction.legend).forEach((obj, i) => {
            if(obj !== 'background') {
                ctx.fillText(`> ${obj.toUpperCase()}`, 30, 50 + (i * 30));
            }
        });

        document.getElementById('data-count').innerText = Object.keys(prediction.legend).length - 1;
        requestAnimationFrame(predict);
    }
</script>
</body>
</html>
