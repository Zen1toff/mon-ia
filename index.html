<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Slot HUD Pro</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --gold: #ffd700;
            --deep-purple: #2d004d;
            --dark-bg: #0b0118;
        }

        body {
            background: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CONTENEUR MOBILE --- */
        #game-container {
            width: 420px;
            height: 880px;
            background: radial-gradient(circle at top, #4b0082 0%, #0b0118 100%);
            border: 4px solid #333;
            border-radius: 35px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.4);
        }

        /* --- TOP BAR (Solde & Niveau) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 35px 35px 0 0;
        }
        .balance { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        .level { background: #ff00ff; padding: 2px 10px; border-radius: 10px; font-size: 0.8rem; }

        /* --- JACKPOTS (Fidèle à l'image) --- */
        .jackpot-section {
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        .jackpot {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--gold);
            text-align: center;
            border-radius: 5px;
            padding: 5px;
            font-size: 0.7rem;
        }
        .grand {
            grid-column: span 2;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            color: black;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- MENU LATÉRAL (Quêtes) --- */
        .side-menu {
            position: absolute;
            left: 0;
            top: 180px;
            width: 70px;
            background: linear-gradient(180deg, var(--neon-purple), transparent);
            border-radius: 0 15px 15px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px 0;
            align-items: center;
            z-index: 10;
        }
        .side-icon { width: 45px; height: 45px; background: #fff; border-radius: 8px; border: 2px solid var(--gold); }

        /* --- ZONE DRAGON --- */
        .dragon-header {
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            filter: drop-shadow(0 0 20px var(--gold));
        }

        /* --- GRILLE DE JEU 5x4 --- */
        .slot-grid {
            flex-grow: 1;
            margin: 10px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon-purple);
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            padding: 5px;
            overflow: hidden;
        }
        .reel {
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .symbol {
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            border-bottom: 1px solid #222;
        }

        /* --- FOOTER CONTROLS --- */
        .footer {
            background: linear-gradient(0deg, #000, #220044);
            padding: 20px;
            border-top: 3px solid var(--neon-purple);
            text-align: center;
            border-radius: 0 0 35px 35px;
        }
        .bet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .bet-box {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-purple);
        }
        .spin-btn {
            background: linear-gradient(#ff0055, #aa0033);
            border: 2px solid #fff;
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 40px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.5);
        }
        .spin-btn:active { transform: scale(0.95); }

        /* --- ANIMATION SPIN --- */
        .spinning {
            animation: blur-spin 0.1s infinite linear;
        }
        @keyframes blur-spin {
            0% { filter: blur(0); transform: translateY(0); }
            50% { filter: blur(8px); transform: translateY(-20px); }
            100% { filter: blur(0); transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <div class="balance">💰 <span id="balance">100,000.00</span></div>
        <div class="level">LV. 44</div>
    </div>

    <div class="jackpot-section">
        <div class="jackpot grand">GRAND: 2,409,276,000</div>
        <div class="jackpot">MAXI: 12,472,000</div>
        <div class="jackpot">MAJOR: 741,312,000</div>
    </div>

    <div class="side-menu">
        <div class="side-icon" style="background: url('https://img.icons8.com/color/48/000000/treasure-chest.png') center no-repeat;"></div>
        <div class="side-icon" style="background: url('https://img.icons8.com/color/48/000000/gift.png') center no-repeat;"></div>
        <div class="side-icon" style="background: url('https://img.icons8.com/color/48/000000/flash-on.png') center no-repeat;"></div>
    </div>

    <div class="dragon-header">🐉</div>

    <div class="slot-grid" id="grid">
        <div class="reel" id="r0"></div>
        <div class="reel" id="r1"></div>
        <div class="reel" id="r2"></div>
        <div class="reel" id="r3"></div>
        <div class="reel" id="r4"></div>
    </div>

    <div class="footer">
        <div style="font-size: 1.2rem; color: var(--gold); margin-bottom: 10px;">BONNE CHANCE !</div>
        <div class="bet-row">
            <div class="bet-box">
                <span style="font-size: 0.7rem; display: block; color: #aaa;">MISE TOTALE</span>
                <span id="bet-val" style="font-weight: bold;">0.75</span>
            </div>
            <button onclick="changeBet(0.25)" style="background:none; border:1px solid #fff; color:white; border-radius:50%; width:30px; height:30px;">+</button>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="play()">LANCER</button>
    </div>
</div>

<script>
    let balance = 100000.00;
    let bet = 0.75;
    const symbols = ['🐉', '💎', '🧧', '🔱', '💰', '🔥', 'K', 'Q', 'J'];
    const reelElems = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3'), document.getElementById('r4')];

    // Initialiser les symboles
    function init() {
        reelElems.forEach(reel => {
            reel.innerHTML = '';
            for(let i=0; i<4; i++) { // 4 lignes
                let s = document.createElement('div');
                s.className = 'symbol';
                s.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                reel.appendChild(s);
            }
        });
    }

    function changeBet(val) {
        bet += val;
        document.getElementById('bet-val').innerText = bet.toFixed(2);
    }

    function play() {
        if(balance < bet) return alert("Plus assez d'argent !");
        
        balance -= bet;
        document.getElementById('balance').innerText = balance.toLocaleString();
        document.getElementById('spin-btn').disabled = true;

        reelElems.forEach((reel, i) => {
            setTimeout(() => {
                reel.classList.add('spinning');
                
                let count = 0;
                let timer = setInterval(() => {
                    reel.querySelectorAll('.symbol').forEach(s => {
                        s.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    });
                    count++;
                    if(count > 20) {
                        clearInterval(timer);
                        reel.classList.remove('spinning');
                        if(i === 4) stopSpin();
                    }
                }, 50);
            }, i * 100);
        });
    }

    function stopSpin() {
        document.getElementById('spin-btn').disabled = false;
        // Simulation gain (1 chance sur 4)
        if(Math.random() > 0.75) {
            let win = bet * 5;
            balance += win;
            alert("GAGNÉ : " + win.toFixed(2) + " !");
            document.getElementById('balance').innerText = balance.toLocaleString();
        }
    }

    init();
</script>

</body>
</html>
