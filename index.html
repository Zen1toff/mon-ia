<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Tracking Surface AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info { position: fixed; top: 10px; width: 100%; text-align: center; color: #00ffcc; z-index: 10; font-family: monospace; pointer-events: none; }
        #webcam { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; transform: scaleX(-1); }
        canvas { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="info">APPROCHEZ VOTRE MAIN...<br>PINCEZ POUR DÉPLACER LE CUBE SUR LES SURFACES</div>
    <video id="webcam" playsinline></video>

    <script>
        const video = document.getElementById('webcam');
        let scene, camera, renderer, cube;
        let isDragging = false;

        // 1. Initialisation 3D
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ffcc, emissive: 0x004433 });
            cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, 0, -1); 
            scene.add(cube);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 2, 2);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        // 2. Configuration MediaPipe Hands (Détection de la main)
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const thumb = hand[4];
                const index = hand[8];

                // Calcul du pincement (Distance 3D entre pouce et index)
                const dx = thumb.x - index.x;
                const dy = thumb.y - index.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 0.05) { // Seuil de pincement
                    isDragging = true;
                    cube.scale.set(1.2, 1.2, 1.2);
                    cube.material.color.setHex(0xff00ff);

                    // Mouvement : On convertit les coordonnées MediaPipe (0 à 1) 
                    // en coordonnées Three.js (-2 à 2 environ)
                    // Note: on inverse X car la caméra est en mode miroir
                    cube.position.x = (0.5 - index.x) * 3; 
                    cube.position.y = (0.5 - index.y) * 2;
                    
                    // Simulation de profondeur : plus l'index est bas, plus le cube "s'éloigne"
                    cube.position.z = -1 - (index.y * 0.5); 
                } else {
                    isDragging = false;
                    cube.scale.set(1, 1, 1);
                    cube.material.color.setHex(0x00ffcc);
                }
            }
        });

        // 3. Boucle principale
        async function start() {
            init3D();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                await video.play();

                const loop = async () => {
                    await hands.send({image: video});
                    renderer.render(scene, camera);
                    requestAnimationFrame(loop);
                };
                loop();
            } catch (e) {
                alert("Caméra non accessible");
            }
        }

        start();
    </script>
</body>
</html>
