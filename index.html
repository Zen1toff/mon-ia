<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rocket Sideswipe Clone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 40px; color: white; pointer-events: none; font-size: 24px; text-shadow: 2px 2px 4px #000; }
        
        /* Boutons style Sideswipe */
        .ctrl-btn { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; user-select: none; }
        #joy-zone { bottom: 40px; left: 40px; width: 120px; height: 120px; }
        #jump-btn { bottom: 60px; right: 140px; width: 80px; height: 80px; }
        #boost-btn { bottom: 40px; right: 40px; width: 90px; height: 90px; background: rgba(255, 100, 0, 0.2); }
    </style>
</head>
<body>

<div id="ui">
    <div style="color: #00d2ff;">BLEU: <span id="score1">0</span></div>
    <div style="color: #ff4d4d;">ROUGE: <span id="score2">0</span></div>
</div>

<div id="joy-zone" class="ctrl-btn">DIR</div>
<div id="jump-btn" class="ctrl-btn">SAUT</div>
<div id="boost-btn" class="ctrl-btn">BOOST</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Vector, Events } = Matter;
const engine = Engine.create();
const w = window.innerWidth;
const h = window.innerHeight;

const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: w, height: h, wireframes: false, background: '#1e293b' }
});

// --- DÉCOR ET ARENE ---
const ground = Bodies.rectangle(w/2, h - 20, w, 40, { isStatic: true, render: { fillStyle: '#334155' } });
const wallL = Bodies.rectangle(10, h/2, 20, h, { isStatic: true });
const wallR = Bodies.rectangle(w - 10, h/2, 20, h, { isStatic: true });
const ceiling = Bodies.rectangle(w/2, 10, w, 20, { isStatic: true });

// Rampes incurvées (simplifiées par des blocs inclinés)
const rampL = Bodies.rectangle(100, h-60, 250, 20, { isStatic: true, angle: -0.5, render: { fillStyle: '#334155' } });
const rampR = Bodies.rectangle(w-100, h-60, 250, 20, { isStatic: true, angle: 0.5, render: { fillStyle: '#334155' } });

// Zones de But (en hauteur comme sur tes photos)
const goal1 = Bodies.rectangle(30, h*0.4, 60, 150, { isSensor: true, isStatic: true, render: { fillStyle: 'rgba(0, 210, 255, 0.3)' } });
const goal2 = Bodies.rectangle(w-30, h*0.4, 60, 150, { isSensor: true, isStatic: true, render: { fillStyle: 'rgba(255, 77, 77, 0.3)' } });

// --- OBJETS ---
const car = Bodies.rectangle(200, h-100, 70, 35, { 
    restitution: 0.1, friction: 0.5, density: 0.002,
    render: { fillStyle: '#00d2ff', sprite: { xScale: 0.5, yScale: 0.5 } } 
});

const ball = Bodies.circle(w/2, h/2, 35, { 
    restitution: 0.9, friction: 0.01, density: 0.0005,
    render: { fillStyle: '#fff', strokeStyle: '#ccc', lineWidth: 3 } 
});

Composite.add(engine.world, [ground, wallL, wallR, ceiling, rampL, rampR, goal1, goal2, car, ball]);

// --- LOGIQUE DE JEU ---
let score1 = 0, score2 = 0;
let isBoosting = false;
let joystick = { x: 0, y: 0 };

// Touches
document.getElementById('boost-btn').addEventListener('touchstart', () => isBoosting = true);
document.getElementById('boost-btn').addEventListener('touchend', () => isBoosting = false);

document.getElementById('jump-btn').addEventListener('touchstart', () => {
    Body.applyForce(car, car.position, { x: 0, y: -0.08 }); // Saut sec
});

document.getElementById('joy-zone').addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const r = e.target.getBoundingClientRect();
    joystick.x = (t.clientX - (r.left + r.width/2)) / 50;
    joystick.y = (t.clientY - (r.top + r.height/2)) / 50;
});
document.getElementById('joy-zone').addEventListener('touchend', () => joystick = { x: 0, y: 0 });

// Boucle de mise à jour
Events.on(engine, 'beforeUpdate', () => {
    // Mouvement Horizontal
    if (Math.abs(joystick.x) > 0.1) {
        Body.setVelocity(car, { x: joystick.x * 6, y: car.velocity.y });
    }

    // Vol / Boost
    if (isBoosting) {
        const force = 0.004;
        Body.applyForce(car, car.position, { 
            x: Math.cos(car.angle) * force * (joystick.x || 1), 
            y: Math.sin(car.angle) * force - 0.002 
        });
    }

    // Redressement auto de la voiture
    Body.setAngle(car, car.angle * 0.9);

    // Détection des buts
    if (ball.position.x < 60 && Math.abs(ball.position.y - h*0.4) < 75) resetBall(2);
    if (ball.position.x > w-60 && Math.abs(ball.position.y - h*0.4) < 75) resetBall(1);
});

function resetBall(winner) {
    if (winner === 1) score1++; else score2++;
    document.getElementById('score1').innerText = score1;
    document.getElementById('score2').innerText = score2;
    
    Body.setPosition(ball, { x: w/2, y: h/2 });
    Body.setVelocity(ball, { x: 0, y: 0 });
    Body.setPosition(car, { x: 200, y: h-100 });
}

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
