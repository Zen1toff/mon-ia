<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR World Cube</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #controls {
            position: fixed; bottom: 30px; width: 100%;
            display: flex; justify-content: center; z-index: 10;
        }
        .btn {
            padding: 15px 25px; background: #00ffcc; border: none;
            border-radius: 50px; font-weight: bold; font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,255,204,0.3);
        }
        video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    
    <div id="controls">
        <button class="btn" id="add-cube">POSER UN CUBE</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const btn = document.getElementById('add-cube');
        let scene, camera, renderer;
        let cubes = [];

        // 1. Initialisation de la Scène 3D
        function initAR() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lumière pour que le cube ait du relief
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        // 2. Accès Caméra Arrière
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" } // Force la caméra arrière
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Erreur caméra : " + err.message);
            }
        }

        // 3. Ajouter un cube "dans le monde"
        btn.onclick = () => {
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
            const newCube = new THREE.Mesh(geometry, material);
            
            // On le place un peu devant la caméra
            newCube.position.set(0, -0.5, -2); 
            scene.add(newCube);
            cubes.push(newCube);
        };

        // 4. Animation (Bousculer les cubes)
        function animate() {
            requestAnimationFrame(animate);
            
            // Petite animation pour simuler la physique ou le flottement
            cubes.forEach(c => {
                c.rotation.x += 0.01;
                c.rotation.y += 0.01;
            });

            renderer.render(scene, camera);
        }

        // Interaction : Cliquer sur l'écran pour "pousser" les cubes
        window.onclick = (e) => {
            cubes.forEach(c => {
                c.position.z -= 0.1; // Le cube s'éloigne quand on "touche" l'écran
                c.position.y += 0.05; // Il remonte un peu (petit saut)
            });
        };

        setupCamera();
        initAR();
        animate();

    </script>
</body>
</html>
