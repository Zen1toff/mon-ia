<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Buster Simulator 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #gui { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: #fff; padding: 15px; border-radius: 10px; border: 2px solid #fff; pointer-events: none; }
        #barre { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; border: 2px solid #fff; }
        #remplissage { height: 100%; background: #4CAF50; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="gui">
        <div>CASH: <span id="cash">$0</span></div>
        <div>BAG: <span id="bag">0/50</span></div>
    </div>
    <div id="barre"><div id="remplissage"></div></div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lumière
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Sol
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x999999 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(100, 20));

        // Personnage (Le cube bleu)
        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({ color: 0x0000ff }));
        player.position.y = 0.5;
        scene.add(player);

        // Zone de vente (Cercle rouge)
        const sellZone = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.1, 32), new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 }));
        sellZone.position.set(10, 0, 10);
        scene.add(sellZone);

        // Cubes à ramasser
        let cubes = [];
        function createCube() {
            const c = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
            c.position.set(Math.random()*20-10, 0.2, Math.random()*20-10);
            scene.add(c);
            cubes.push(c);
        }
        for(let i=0; i<30; i++) createCube();

        // Variables de jeu
        let money = 0;
        let inventory = 0;
        const keys = {};

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);

            // Déplacement
            if(keys['KeyW']) player.position.z -= 0.1;
            if(keys['KeyS']) player.position.z += 0.1;
            if(keys['KeyA']) player.position.x -= 0.1;
            if(keys['KeyD']) player.position.x += 0.1;

            // Ramassage
            cubes.forEach((c, i) => {
                if(player.position.distanceTo(c.position) < 1 && inventory < 50) {
                    scene.remove(c);
                    cubes.splice(i, 1);
                    inventory++;
                    document.getElementById('bag').innerText = inventory + "/50";
                    document.getElementById('remplissage').style.width = (inventory/50*100) + "%";
                    setTimeout(createCube, 2000);
                }
            });

            // Vente
            if(player.position.distanceTo(sellZone.position) < 3 && inventory > 0) {
                money += inventory * 10;
                inventory = 0;
                document.getElementById('cash').innerText = "$" + money;
                document.getElementById('bag').innerText = "0/50";
                document.getElementById('remplissage').style.width = "0%";
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
