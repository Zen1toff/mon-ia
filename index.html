<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL STRIKE | Browser Battle Royale</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 20px; border: 2px solid rgba(0,255,0,0.5);
            transform: translate(-50%, -50%); border-radius: 50%;
        }
        #mini-map { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; background: rgba(0,0,0,0.7); border: 1px solid #0f0; }
        .joystick { position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        /* Affiche le joystick uniquement sur mobile */
        @media (pointer: coarse) { .joystick { display: block; pointer-events: auto; } }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="mini-map"></div>
        
        <div style="position: absolute; top: 20px; right: 20px; color: #0f0;">
            JOUEURS EN VIE : <span id="alive-count">100</span>
        </div>

        <div id="move-joystick" class="joystick"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
