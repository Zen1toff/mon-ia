<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>AR Hand Ping-Pong</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: #00ffcc; z-index: 10; font-size: 24px; font-weight: bold; pointer-events: none; }
        video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        canvas { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span><br><small>UTILISE TA MAIN COMME RAQUETTE</small></div>
    <video id="webcam" playsinline></video>

    <script>
        let scene, camera, renderer, ball, paddle;
        let score = 0;
        let ballVel = new THREE.Vector3(0.02, 0.02, -0.05); // Vitesse de la balle
        const video = document.getElementById('webcam');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // La Balle
            const ballGeom = new THREE.SphereGeometry(0.1, 32, 32);
            const ballMat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0x333300 });
            ball = new THREE.Mesh(ballGeom, ballMat);
            ball.position.set(0, 0, -3);
            scene.add(ball);

            // La Raquette (Visuelle, attachée à la main)
            const padGeom = new THREE.PlaneGeometry(0.6, 0.6);
            const padMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.5 });
            paddle = new THREE.Mesh(padGeom, padMat);
            scene.add(paddle);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            camera.position.z = 0;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Positionner la raquette sur la paume (point 9)
                const x = (0.5 - hand[9].x) * (camera.aspect * 3);
                const y = (0.5 - hand[9].y) * 3;
                paddle.position.set(x, y, -1.2); // Placée juste devant la caméra

                // --- GESTION DES COLLISIONS ---
                const dist = ball.position.distanceTo(paddle.position);
                
                // Si la balle touche la raquette (profondeur Z proche de -1.2)
                if (Math.abs(ball.position.z - paddle.position.z) < 0.2) {
                    if (Math.abs(ball.position.x - paddle.position.x) < 0.4 && 
                        Math.abs(ball.position.y - paddle.position.y) < 0.4) {
                        
                        // Rebond !
                        ballVel.z = -ballVel.z; 
                        ballVel.x += (ball.position.x - paddle.position.x) * 0.1; // Ajoute de l'effet
                        ballVel.y += (ball.position.y - paddle.position.y) * 0.1;
                        
                        score++;
                        document.getElementById('score').innerText = score;
                        ball.position.z = -1.3; // Évite les doubles collisions
                    }
                }
            }
        });

        function updateBall() {
            ball.position.add(ballVel);

            // Rebond sur les murs virtuels (gauche/droite/haut/bas)
            if (Math.abs(ball.position.x) > 2) ballVel.x *= -1;
            if (Math.abs(ball.position.y) > 1.5) ballVel.y *= -1;
            
            // Rebond au fond
            if (ball.position.z < -5) ballVel.z *= -1;

            // Perdu (si la balle passe derrière toi)
            if (ball.position.z > 0.5) {
                ball.position.set(0, 0, -3);
                ballVel.set(0.02, 0.02, -0.05);
                score = 0;
                document.getElementById('score').innerText = score;
            }
        }

        async function start() {
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            await video.play();

            const loop = async () => {
                await hands.send({image: video});
                updateBall();
                renderer.render(scene, camera);
                requestAnimationFrame(loop);
            };
            loop();
        }

        start();
    </script>
</body>
</html>
