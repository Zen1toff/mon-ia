<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Roblox Clone - Cube Buster</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #87CEEB; }
        canvas { display: block; }
        
        /* Interface UI comme sur l'image */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Laisse passer les clics vers le jeu */
        }
        .stat-box {
            position: absolute; right: 20px; top: 20px;
            background: rgba(0,0,0,0.6); color: white; padding: 15px;
            border-radius: 10px; border: 3px solid #000; min-width: 150px;
        }
        .sell-zone-ui {
            position: absolute; bottom: 50px; right: 50px;
            width: 100px; height: 100px; background: rgba(255,0,0,0.5);
            border: 5px solid red; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 20px;
        }
        #inventory-bar {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 300px; height: 30px;
            background: #444; border: 3px solid #000; border-radius: 5px;
        }
        #inventory-fill {
            width: 0%; height: 100%; background: #4CAF50; transition: width 0.2s;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-box">
            <div>CASH: <span id="cash-val">$0</span></div>
            <div>BAG: <span id="bag-val">0/50</span></div>
        </div>
        <div id="inventory-bar"><div id="inventory-fill"></div></div>
        <div class="sell-zone-ui">SELL</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CONFIGURATION ---
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 40,
    speed: 5,
    cash: 0,
    bag: 0,
    maxBag: 50
};

let cubes = [];
const sellZone = { x: canvas.width - 100, y: canvas.height - 100, radius: 60 };
const keys = {};

// Générer des cubes aléatoires
for(let i=0; i<40; i++) {
    spawnCube();
}

function spawnCube() {
    cubes.push({
        x: Math.random() * (canvas.width - 50) + 25,
        y: Math.random() * (canvas.height - 150) + 25,
        color: `hsl(${Math.random() * 360}, 70%, 50%)`,
        size: 15
    });
}

// --- LOGIQUE DE MOUVEMENT ---
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    // Déplacement ZQSD ou Flèches
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    // Collision avec les cubes (Collecte)
    cubes = cubes.filter(cube => {
        let dist = Math.hypot(player.x - cube.x, player.y - cube.y);
        if (dist < 40 && player.bag < player.maxBag) {
            player.bag++;
            setTimeout(spawnCube, 2000); // Repop après 2s
            updateUI();
            return false;
        }
        return true;
    });

    // Zone de vente
    let distToSell = Math.hypot(player.x - sellZone.x, player.y - sellZone.y);
    if (distToSell < sellZone.radius && player.bag > 0) {
        player.cash += player.bag * 10;
        player.bag = 0;
        updateUI();
    }
}

function updateUI() {
    document.getElementById('cash-val').innerText = "$" + player.cash;
    document.getElementById('bag-val').innerText = `${player.bag}/${player.maxBag}`;
    document.getElementById('inventory-fill').style.width = (player.bag / player.maxBag * 100) + "%";
}

// --- RENDU GRAPHIQUE ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dessiner le sol (grille comme Roblox Studio)
    ctx.strokeStyle = "#ddd";
    for(let i=0; i<canvas.width; i+=50) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for(let i=0; i<canvas.height; i+=50) {
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Dessiner la zone SELL
    ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
    ctx.beginPath();
    ctx.arc(sellZone.x, sellZone.y, sellZone.radius, 0, Math.PI*2);
    ctx.fill();

    // Dessiner les cubes
    cubes.forEach(cube => {
        ctx.fillStyle = cube.color;
        ctx.shadowBlur = 10; ctx.shadowColor = cube.color;
        ctx.fillRect(cube.x, cube.y, cube.size, cube.size);
        ctx.shadowBlur = 0;
    });

    // Dessiner le Joueur (le "Noob")
    ctx.fillStyle = "#F5D142"; // Tête jaune
    ctx.fillRect(player.x - 10, player.y - 25, 20, 20);
    ctx.fillStyle = "#0055AA"; // Corps bleu
    ctx.fillRect(player.x - 15, player.y - 5, 30, 30);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
