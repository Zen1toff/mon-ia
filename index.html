<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Casino - iOS 26 Pro</title>
    <style>
        :root {
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Utilise toute la hauteur de l'écran */
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* --- LE CADRE ADAPTATIF --- */
        #game-view {
            width: 100vw;
            height: 100vh;
            max-width: 450px; /* Limite la largeur sur PC */
            max-height: 900px; /* Limite la hauteur sur PC */
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop') center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            /* Simule le bord d'un iPhone sur les grands écrans */
            border: 2px solid #333;
            border-radius: 40px;
        }

        /* Barre d'état dynamique */
        .header {
            padding: 20px;
            padding-top: 40px; /* Espace pour la "Dynamic Island" */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .balance-pill {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass);
            color: var(--gold);
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Grille auto-ajustable */
        .slot-area {
            flex: 1; /* Prend tout l'espace disponible entre le haut et le bas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px;
        }

        .grid-bg {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 25px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            height: 50%; /* La grille occupe la moitié de l'espace central */
            max-height: 400px;
        }

        .reel {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            justify-content: space-around;
        }

        .symbol {
            font-size: 7vw; /* Taille s'adapte à la largeur de l'écran */
            text-align: center;
        }

        @media (min-width: 450px) {
            .symbol { font-size: 35px; } /* Taille fixe sur PC */
        }

        /* Panel Contrôles iOS 26 */
        .ios-controls {
            padding: 20px;
            padding-bottom: 40px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
        }

        .bet-adjuster {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-ios {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .spin-btn {
            width: 100%;
            height: 65px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #007aff, #00c6ff);
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.4);
            cursor: pointer;
        }

        .spin-btn:active { transform: scale(0.97); }

        /* Animation */
        .blur-anim { animation: fast-spin 0.1s infinite linear; }
        @keyframes fast-spin {
            0% { filter: blur(0); transform: translateY(0); }
            50% { filter: blur(10px); transform: translateY(-10px); }
            100% { filter: blur(0); transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="game-view">
    <div class="header">
        <div class="balance-pill">💰 <span id="balance">100,000</span></div>
        <div style="font-weight: 900; color: #ff3b30;">LV. 55</div>
    </div>

    <div class="slot-area">
        <div style="text-align: center; font-size: 60px; margin-bottom: 20px;">🐉</div>
        <div class="grid-bg">
            <div class="reel" id="r0"></div>
            <div class="reel" id="r1"></div>
            <div class="reel" id="r2"></div>
            <div class="reel" id="r3"></div>
            <div class="reel" id="r4"></div>
        </div>
    </div>

    <div class="ios-controls">
        <div class="bet-adjuster">
            <button class="btn-ios" onclick="changeBet(-100)">-</button>
            <div style="text-align: center;">
                <span style="font-size: 0.7rem; color: #888; display: block;">MISE</span>
                <span id="bet" style="font-size: 1.3rem; font-weight: bold;">1,000</span>
            </div>
            <button class="btn-ios" onclick="changeBet(100)">+</button>
        </div>
        <button class="spin-btn" id="spin-trigger" onclick="run()">RELANCER</button>
    </div>
</div>

<script>
    let bal = 100000;
    let bet = 1000;
    const items = ['🐉', '💎', '🔥', '💰', '🏮', '7️⃣'];
    const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3'), document.getElementById('r4')];

    function init() {
        reels.forEach(r => {
            r.innerHTML = '';
            for(let i=0; i<3; i++) {
                let s = document.createElement('div');
                s.className = 'symbol';
                s.innerText = items[Math.floor(Math.random()*items.length)];
                r.appendChild(s);
            }
        });
    }

    function changeBet(v) {
        bet = Math.max(100, bet + v);
        document.getElementById('bet').innerText = bet.toLocaleString();
    }

    function run() {
        if(bal < bet) return;
        bal -= bet;
        document.getElementById('balance').innerText = bal.toLocaleString();
        document.getElementById('spin-trigger').disabled = true;

        reels.forEach((r, i) => {
            setTimeout(() => {
                r.classList.add('blur-anim');
                let spins = 0;
                let t = setInterval(() => {
                    r.querySelectorAll('.symbol').forEach(s => s.innerText = items[Math.floor(Math.random()*items.length)]);
                    if(++spins > 15) {
                        clearInterval(t);
                        r.classList.remove('blur-anim');
                        if(i === 4) document.getElementById('spin-trigger').disabled = false;
                    }
                }, 50);
            }, i * 100);
        });
    }

    init();
</script>
</body>
</html>
