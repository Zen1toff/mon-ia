<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>World Conquest 3D - Battle Update</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; }
        .panel { 
            background: rgba(0, 10, 20, 0.85); border: 1px solid #00f2ff; 
            color: #00f2ff; padding: 15px; pointer-events: auto; border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .btn { 
            background: #002a33; color: #00f2ff; border: 1px solid #00f2ff; 
            padding: 8px; cursor: pointer; width: 100%; margin-top: 5px;
        }
        .btn:hover { background: #00f2ff; color: #000; }
        #target-ui { position: absolute; right: 15px; top: 15px; width: 200px; display: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>

<div id="ui">
    <div class="panel">
        <h3 style="margin:0">CENTRE DE COMMANDEMENT</h3>
        <p>OR: <span id="gold-val">1000</span>$</p>
        <p>UNITÉS: <span id="unit-val">0</span></p>
        <button class="btn" onclick="spawnArmy()">ACHETER UNITÉ (200$)</button>
        <button class="btn" style="border-color: #ff4444; color: #ff4444;" onclick="buyNuke()">NUKE (5000$)</button>
    </div>
</div>

<div id="target-ui" class="panel">
    <h4 id="target-name">Cible</h4>
    <button class="btn" onclick="launchAttack()">ENVOYER TROUPES</button>
    <button class="btn" style="color:red" onclick="detonateNuke()">FRAPPE NUCLÉAIRE</button>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- SETUP SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lumières
    scene.add(new THREE.AmbientLight(0x4444ff, 1.5));
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(10, 10, 10);
    scene.add(sun);

    // --- GLOBE ---
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const geo = new THREE.SphereGeometry(5, 64, 64);
    const mat = new THREE.MeshPhongMaterial({
        color: 0x111111,
        emissive: 0x112244,
        wireframe: true // Style "Hologramme" pour être sûr de le voir
    });
    
    const earth = new THREE.Mesh(geo, mat);
    earthGroup.add(earth);

    // Charger texture réelle
    new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', (tex) => {
        mat.map = tex;
        mat.wireframe = false;
        mat.needsUpdate = true;
    });

    // --- DATA & LOGIQUE ---
    let state = { gold: 1000, units: 0, hasNuke: false, selectedTarget: null };

    // Fonction pour convertir Lat/Lon en Position 3D
    function getPos(lat, lon, radius = 5.1) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -(radius * Math.sin(phi) * Math.cos(theta)),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    // Créer des bases cliquables
    const bases = [
        { name: "Paris", lat: 48.8, lon: 2.3 },
        { name: "New York", lat: 40.7, lon: -74 },
        { name: "Moscou", lat: 55.7, lon: 37.6 },
        { name: "Pékin", lat: 39.9, lon: 116.4 }
    ];

    bases.forEach(b => {
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        mesh.position.copy(getPos(b.lat, b.lon));
        mesh.userData = { name: b.name, isBase: true };
        earthGroup.add(mesh);
    });

    // --- ACTIONS DU JOUEUR ---
    window.spawnArmy = () => {
        if(state.gold >= 200) {
            state.gold -= 200;
            state.units++;
            // Créer un petit soldat (cylindre) sur une position aléatoire possédée
            const armyMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 0.3),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            armyMesh.position.copy(getPos(48, 2, 5.2)); // Spawn à Paris par défaut
            earthGroup.add(armyMesh);
            updateUI();
        }
    };

    window.detonateNuke = () => {
        if(state.gold >= 500) { // On triche pour le test, on l'active si on a l'or
            const targetPos = state.selectedTarget.position;
            const boom = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8 })
            );
            boom.position.copy(targetPos);
            earthGroup.add(boom);

            // Animation explosion
            let size = 0.1;
            const interval = setInterval(() => {
                size += 0.1;
                boom.scale.set(size, size, size);
                boom.material.opacity -= 0.02;
                if(size > 15) {
                    scene.remove(boom);
                    clearInterval(interval);
                }
            }, 20);
        }
    };

    // --- INTERACTION ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(earthGroup.children);

        if(intersects.length > 0 && intersects[0].object.userData.isBase) {
            state.selectedTarget = intersects[0].object;
            document.getElementById('target-ui').style.display = 'block';
            document.getElementById('target-name').innerText = state.selectedTarget.userData.name;
        } else {
            document.getElementById('target-ui').style.display = 'none';
        }
    });

    // Rotation du globe
    let isMoving = false;
    window.onmousedown = () => isMoving = true;
    window.onmouseup = () => isMoving = false;
    window.onmousemove = (e) => {
        if(isMoving) {
            earthGroup.rotation.y += e.movementX * 0.005;
            earthGroup.rotation.x += e.movementY * 0.005;
        }
    };

    camera.position.z = 12;

    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(state.gold);
        document.getElementById('unit-val').innerText = state.units;
    }

    function animate() {
        requestAnimationFrame(animate);
        state.gold += 0.2;
        updateUI();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
