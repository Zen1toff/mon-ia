<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Stream-Dash : Dashboard Live</title>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #0a0a0a; 
            color: #efeff1; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Panneau de configuration au milieu au début */
        #setup {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        input { 
            padding: 12px; width: 300px; border-radius: 4px; border: 1px solid #9147ff;
            background: #18181b; color: white; font-size: 16px; margin-bottom: 10px;
        }
        button { 
            padding: 12px 24px; background: #9147ff; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        /* Layout du Dashboard */
        #main-container { display: flex; width: 100%; height: 100%; visibility: hidden; }

        /* Zone Vidéo (Gameplay) */
        #video-player { flex: 1; background: #000; }

        /* Zone Chat et Stats */
        #sidebar { 
            width: 340px; 
            display: flex; 
            flex-direction: column; 
            background: #18181b; 
            border-left: 1px solid #26262c;
        }

        #stats-bar {
            padding: 15px;
            background: #1f1f23;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            border-bottom: 1px solid #26262c;
        }

        .status-dot { width: 10px; height: 10px; background: #eb0400; border-radius: 50%; display: inline-block; margin-right: 5px; }

        #twitch-chat { flex: 1; border: none; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #9147ff;">STREAM-DASH</h1>
    <input type="text" id="channel-name" placeholder="Nom de ta chaîne Twitch...">
    <button onclick="launchDashboard()">LANCER LE DASHBOARD</button>
</div>

<div id="main-container">
    <div id="video-player"></div>

    <div id="sidebar">
        <div id="stats-bar">
            <span><span class="status-dot"></span> LIVE</span>
            <span id="viewer-count">0 VIEWERS</span>
        </div>
        <iframe id="twitch-chat" src="" height="100%" width="100%"></iframe>
    </div>
</div>

<script>
    function launchDashboard() {
        const channel = document.getElementById('channel-name').value.trim();
        if (!channel) return alert("Veuillez entrer un nom de chaîne.");

        // Afficher l'interface
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main-container').style.visibility = 'visible';

        // 1. Charger le Lecteur Vidéo (Gameplay)
        var options = {
            width: "100%",
            height: "100%",
            channel: channel,
            parent: [window.location.hostname || "localhost"]
        };
        var player = new Twitch.Player("video-player", options);

        // 2. Charger le Chat
        // Note : Twitch demande parfois que le site soit en HTTPS pour le chat embed
        document.getElementById('twitch-chat').src = `https://www.twitch.tv/embed/${channel}/chat?parent=${window.location.hostname || "localhost"}&darkpopout`;

        // 3. Mettre à jour les Viewers (Via l'API du player)
        setInterval(() => {
            const stats = player.getStats();
            // Note : player.getStats() ne donne pas toujours les viewers en direct sur l'embed simple 
            // pour des raisons de confidentialité, mais il confirme si le live tourne bien.
            // On affiche "ONLINE" si le player a chargé des données.
            if(player.getChannel()) {
                document.getElementById('viewer-count').innerText = "SESSION ACTIVE";
            }
        }, 5000);
    }
</script>
</body>
</html>
