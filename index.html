<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slither Mobile</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #111; 
            font-family: sans-serif; 
            touch-action: none; /* Empêche le zoom/scroll accidentel */
        }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="score">Score: 0</h2>
    <p>Touche l'écran pour diriger le serpent</p>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let score = 0;
const foods = [];
const bots = [];
const FOOD_COUNT = 60;
const BOT_COUNT = 4;

const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 8,
    color: '#00ffcc',
    tail: [],
    length: 15,
    angle: 0,
    targetAngle: 0
};

// --- GESTION DU TACTILE ---
function handleInput(ex, ey) {
    const dx = ex - player.x;
    const dy = ey - player.y;
    player.targetAngle = Math.atan2(dy, dx);
}

window.addEventListener('touchstart', (e) => {
    handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    e.preventDefault(); // Bloque le défilement de la page
    handleInput(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

// Support souris aussi pour tester sur PC
window.addEventListener('mousemove', (e) => {
    handleInput(e.clientX, e.clientY);
});

class Bot {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = 7;
        this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
        this.tail = [];
        this.length = 15;
        this.angle = Math.random() * Math.PI * 2;
    }
    update() {
        this.angle += (Math.random() - 0.5) * 0.2;
        this.x += Math.cos(this.angle) * 1.8;
        this.y += Math.sin(this.angle) * 1.8;
        if (this.x < 0 || this.x > canvas.width) this.angle = Math.PI - this.angle;
        if (this.y < 0 || this.y > canvas.height) this.angle = -this.angle;
        this.tail.unshift({ x: this.x, y: this.y });
        if (this.tail.length > this.length) this.tail.pop();
    }
    draw() { drawSnake(this.tail, this.color, this.radius); }
}

function spawnFood() {
    foods.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 3,
        color: `hsl(${Math.random() * 360}, 100%, 60%)`
    });
}

for (let i = 0; i < FOOD_COUNT; i++) spawnFood();
for (let i = 0; i < BOT_COUNT; i++) bots.push(new Bot());

function drawSnake(tail, color, radius) {
    if (tail.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = radius * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.moveTo(tail[0].x, tail[0].y);
    for (let i = 1; i < tail.length; i++) {
        ctx.lineTo(tail[i].x, tail[i].y);
    }
    ctx.stroke();
}

function update() {
    // Interpolation de l'angle pour un virage fluide
    let diff = player.targetAngle - player.angle;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    player.angle += diff * 0.1;

    player.x += Math.cos(player.angle) * 2.5;
    player.y += Math.sin(player.angle) * 2.5;

    // Sortie d'écran (téléportation de l'autre côté)
    if (player.x < 0) player.x = canvas.width;
    if (player.x > canvas.width) player.x = 0;
    if (player.y < 0) player.y = canvas.height;
    if (player.y > canvas.height) player.y = 0;

    player.tail.unshift({ x: player.x, y: player.y });
    if (player.tail.length > player.length) player.tail.pop();

    foods.forEach((food, i) => {
        if (Math.hypot(player.x - food.x, player.y - food.y) < player.radius + food.radius) {
            foods.splice(i, 1);
            player.length += 1.5;
            score += 5;
            scoreEl.innerText = `Score: ${score}`;
            spawnFood();
        }
    });

    bots.forEach(bot => bot.update());
}

function loop() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    foods.forEach(f => {
        ctx.beginPath();
        ctx.fillStyle = f.color;
        ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2);
        ctx.fill();
    });

    bots.forEach(b => b.draw());
    drawSnake(player.tail, player.color, player.radius);

    update();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
