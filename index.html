<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caméra IA - Détection de Main</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #input_video { display: none; } /* On cache la vidéo brute */
        #output_canvas { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; top: 10px; left: 10px; color: #00ff00; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="info">IA Active : Détection de points de contrôle</div>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
        // Ajuster la taille du canvas à la vidéo
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Dessiner l'image de la caméra
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // 1. Dessiner les lignes et points (Style Cyberpunk)
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 3});

                // 2. Dessiner les coordonnées numériques (L'effet de ta capture)
                canvasCtx.fillStyle = "white";
                canvasCtx.font = "8px monospace";
                landmarks.forEach((point, index) => {
                    const x = point.x * canvasElement.width;
                    const y = point.y * canvasElement.height;
                    // On affiche un nombre aléatoire simulant un ID ou la coordonnée Z
                    const val = Math.round(point.z * -10000);
                    canvasCtx.fillText(val, x + 5, y - 5);
                });
            }
        }
        canvasCtx.restore();
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720,
        facingMode: "environment" // Utilise la caméra ARRIÈRE de l'iPhone
    });
    
    camera.start();
</script>
</body>
</html>
