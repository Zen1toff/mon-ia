<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FaceSwap IA - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <style>
        :root { --primary: #00ffcc; --error: #ff4444; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* Écran de chargement et Menu */
        #overlay { 
            position: fixed; inset: 0; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #111; transition: 0.5s; 
        }
        
        /* Barre d'état en haut */
        #status-bar {
            position: fixed; top: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; 
            justify-content: center; font-size: 13px; z-index: 101;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-error { background: var(--error) !important; font-weight: bold; }

        /* Loader */
        .loader {
            width: 40px; height: 40px; border: 3px solid #333;
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
            display: none;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        
        .btn { 
            padding: 16px 32px; background: var(--primary); border: none; 
            border-radius: 50px; font-weight: bold; color: #000; font-size: 1rem;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="status-bar">Prêt pour l'importation</div>

    <div id="overlay">
        <div id="loader" class="loader"></div>
        <div id="menu-content">
            <h2 style="margin-bottom: 5px;">FACE SWAP IA</h2>
            <p style="color: #888; margin-bottom: 30px;">Format recommandé : Portrait</p>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button class="btn" onclick="document.getElementById('file-input').click()">1. CHOISIR UNE PHOTO</button>
            <br>
            <button id="start-btn" class="btn" style="display:none; background:white; margin-top:15px;">2. LANCER L'IA</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="output"></canvas>
    </div>
    
    <video id="webcam" autoplay playsinline muted style="display:none;"></video>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const statusBar = document.getElementById('status-bar');
        const loader = document.getElementById('loader');
        const menuContent = document.getElementById('menu-content');
        
        let targetImg = new Image();
        let faceMesh;

        // --- GESTION D'ERREUR ---
        function showError(msg) {
            statusBar.innerText = "ERREUR : " + msg;
            statusBar.classList.add('status-error');
            loader.style.display = "none";
            menuContent.style.display = "block";
        }

        // --- 1. CHARGEMENT IMAGE ---
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                targetImg.onload = () => {
                    document.getElementById('start-btn').style.display = "inline-block";
                    statusBar.innerText = "Photo chargée avec succès";
                };
                targetImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- 2. LOGIQUE IA ---
        async function setupIA() {
            try {
                faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5 });
                
                faceMesh.onResults((results) => {
                    // Masquer le loader à la première détection
                    if (document.getElementById('overlay').style.display !== 'none') {
                        document.getElementById('overlay').style.opacity = "0";
                        setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
                    }

                    ctx.save();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                        const points = results.multiFaceLandmarks[0];
                        ctx.beginPath();
                        ctx.moveTo(points[10].x * canvas.width, points[10].y * canvas.height);
                        for(let i=0; i<points.length; i+=8) {
                            ctx.lineTo(points[i].x * canvas.width, points[i].y * canvas.height);
                        }
                        ctx.closePath();
                        ctx.clip();
                        ctx.drawImage(targetImg, 0, 0, canvas.width, canvas.height);
                        statusBar.innerText = "SYNC ACTIVE ✨";
                    } else {
                        statusBar.innerText = "RECHERCHE VISAGE...";
                    }
                    ctx.restore();
                });
            } catch (e) {
                showError("Impossible de charger les fichiers IA");
            }
        }

        // --- 3. DÉMARRAGE ---
        document.getElementById('start-btn').onclick = async () => {
            menuContent.style.display = "none";
            loader.style.display = "block";
            statusBar.innerText = "Initialisation caméra & IA...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;

                await setupIA();

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    document.getElementById('canvas-container').style.display = 'block';
                    
                    const cameraLoop = async () => {
                        await faceMesh.send({image: video});
                        requestAnimationFrame(cameraLoop);
                    };
                    cameraLoop();
                };
            } catch (err) {
                showError("Accès caméra refusé ou non supporté");
            }
        };
    </script>
</body>
</html>
