<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Face Swapper - Version Stable</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; color: white; }
        
        /* Menu */
        #menu {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); padding: 20px;
        }
        
        #preview-img { width: 120px; height: 120px; object-fit: cover; border-radius: 60px; margin: 20px; display: none; border: 3px solid #00ffcc; }
        
        .btn {
            padding: 15px 30px; background: #00ffcc; color: black;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.1rem;
        }

        /* Zone de rendu */
        #canvas-container { position: fixed; inset: 0; z-index: 1; display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); } /* Effet miroir */
        #video-hidden { display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>FACE SWAP IA</h1>
        <p>Remplace ton visage par celui d'une photo en direct</p>
        
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <button class="btn" onclick="document.getElementById('file-input').click()">1. CHOISIR UN VISAGE</button>
        
        <img id="preview-img" alt="Aperçu du visage">
        
        <button id="start-btn" class="btn" style="background: #555; pointer-events: none;">2. LANCER L'ÉCHANGE</button>
    </div>

    <div id="canvas-container">
        <canvas id="output-canvas"></canvas>
    </div>
    
    <video id="video-hidden" autoplay playsinline muted></video>

    <script>
        const video = document.getElementById('video-hidden');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const startBtn = document.getElementById('start-btn');
        
        let targetFaceMesh = null; // Les points du visage de la photo
        let targetImg = new Image();
        let isTargetLoaded = false;

        // --- 1. CONFIGURATION DE L'IA FACE MESH ---
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Plus de précision pour les yeux/lèvres
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // --- 2. TRAITEMENT DE L'IMAGE IMPORTÉE (Target) ---
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = "block";
                    targetImg.src = event.target.result;
                    
                    targetImg.onload = async () => {
                        // On lance Face Mesh UNE SEULE FOIS sur la photo pour uploader les points
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = targetImg.width; tempCanvas.height = targetImg.height;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(targetImg, 0, 0);
                        
                        // Détection ponctuelle sur la photo
                        faceMesh.onResults((results) => {
                            if (results.multiFaceLandmarks.length > 0) {
                                targetFaceMesh = results.multiFaceLandmarks[0];
                                isTargetLoaded = true;
                                startBtn.style.background = "#00ffcc";
                                startBtn.style.pointerEvents = "auto";
                            } else {
                                alert("Aucun visage détecté sur la photo. Essayez-en une autre.");
                            }
                        });
                        await faceMesh.send({image: tempCanvas});
                    };
                };
                reader.readAsDataURL(file);
            }
        };

        // --- 3. BOUCLE DE RENDU EN DIRECT (Swap) ---
        function drawTriangle(ctx, img, s0, s1, s2, d0, d1, d2) {
            ctx.save();
            // Créer le chemin du triangle de destination
            ctx.beginPath(); ctx.moveTo(d0.x, d0.y); ctx.lineTo(d1.x, d1.y); ctx.lineTo(d2.x, d2.y); ctx.closePath(); ctx.clip();

            // Calculer la transformation affine (déformation texturelle)
            // (Simplifié ici pour mobile, utilise une déformation de base)
            ctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        // Configuration pour le swap direct
        faceMesh.onResults((results) => {
            if (!isTargetLoaded || !results.multiFaceLandmarks) return;
            
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const currentFaceMesh = results.multiFaceLandmarks[0];

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0); // Fond : vidéo originale

            // ICI COMMENCE LA MAGIE (Simplifiée pour la démo)
            // Pour un vrai swap, il faut des centaines de drawTriangle.
            // Cette version crée un masque souple basé sur le Face Mesh.
            
            if(currentFaceMesh && targetFaceMesh) {
                // Créer le chemin du visage actuel
                ctx.beginPath();
                for (let i = 0; i < currentFaceMesh.length; i++) {
                    const point = currentFaceMesh[i];
                    if (i === 0) ctx.moveTo(point.x * canvas.width, point.y * canvas.height);
                    else ctx.lineTo(point.x * canvas.width, point.y * canvas.height);
                }
                ctx.closePath(); ctx.clip(); // On ne dessine que DANS ton visage

                // Dessiner l'image du visage cible, déformée grossièrement pour suivre
                ctx.drawImage(targetImg, 0, 0, canvas.width, canvas.height);
            }

            ctx.restore();
        });

        // --- 4. LANCER LA CAMÉRA ---
        startBtn.onclick = async () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });
            video.srcObject = stream;
            
            // Relancer FaceMesh en mode boucle direct
            faceMesh.onResults((results) => { /* Code du Swap défini plus haut */ });

            const camera = new Camera(video, {
                onFrame: async () => {
                    await faceMesh.send({image: video});
                },
                width: 640, height: 480
            });
            camera.start();
        };
    </script>
</body>
</html>
