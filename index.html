<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>UNO 3D Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info { position: fixed; top: 10px; width: 100%; text-align: center; color: #00ffcc; z-index: 10; font-family: monospace; }
        video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.4; }
        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">MAIN GAUCHE : PAQUET | MAIN DROITE : PINCEZ LE HAUT DU PAQUET</div>
    <video id="webcam" playsinline></video>

    <script>
        let scene, camera, renderer, deck;
        const video = document.getElementById('webcam');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // CRÉATION DU PAQUET (Plus gros pour éviter l'effet "ligne")
            const geometry = new THREE.BoxGeometry(0.5, 0.4, 0.1); // Largeur, Hauteur, Épaisseur
            const material = new THREE.MeshPhongMaterial({ color: 0xed1c24, emissive: 0x330000 });
            deck = new THREE.Mesh(geometry, material);
            scene.add(deck);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 1, 2);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
            camera.position.z = 2;
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ 
            maxNumHands: 2, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.6, 
            minTrackingConfidence: 0.6 
        });

        hands.onResults((results) => {
            renderer.render(scene, camera);
            
            if (results.multiHandLandmarks && results.multiHandedness) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const isLeft = results.multiHandedness[index].label === "Right"; // MediaPipe inverse souvent Left/Right en miroir

                    if (isLeft) {
                        // Positionner le paquet sur la paume (point 9 - base du majeur)
                        // Conversion coordonées 0-1 vers Three.js
                        deck.position.x = (0.5 - landmarks[9].x) * 4; 
                        deck.position.y = (0.5 - landmarks[9].y) * 3;
                        deck.position.z = -landmarks[9].z * 5;

                        // Rotation du paquet selon l'inclinaison de la main
                        deck.rotation.z = Math.atan2(landmarks[17].y - landmarks[5].y, landmarks[17].x - landmarks[5].x);
                        deck.rotation.x = landmarks[9].z * 10;
                    }
                });
            }
        });

        async function start() {
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            await video.play();

            const loop = async () => {
                await hands.send({image: video});
                requestAnimationFrame(loop);
            };
            loop();
        }

        start();
    </script>
</body>
</html>
