<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASTRO_RECON_V4</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; font-family: monospace; color: #00ff41; }
        #hud { position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid #00ff41; font-size: 10px; }
        #guide { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; font-size: 12px; text-align: center; pointer-events: none; }
        #launch { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 4px solid #00ff41; }
    </style>
</head>
<body>

    <div id="launch" onclick="boot()"><h1>[ INITIALIZE_ASTRO_SCAN ]</h1></div>

    <div id="hud">
        > GPS: <span id="st-gps">WAITING</span><br>
        > SUN_ALT: <span id="sun-alt">--</span>°<br>
        > MOON_ALT: <span id="moon-alt">--</span>°
    </div>

    <div id="guide">
        <div id="arrow-sun">SÉLECTIONNER CIBLE...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity id="sky">
            <a-sphere id="sun" radius="8" color="#FFD700" material="shader:flat">
                <a-text value="SUN" align="center" position="0 -10 0" scale="15 15 15" color="yellow"></a-text>
            </a-sphere>
            
            <a-sphere id="moon" radius="6" material="src: https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/space/moon_1024.jpg;">
                <a-text value="MOON" align="center" position="0 -8 0" scale="12 12 12" color="white"></a-text>
            </a-sphere>

            <a-entity id="stars"></a-entity>
        </a-entity>
        <a-camera id="cam" rotation-reader></a-camera>
    </a-scene>

    <script>
        const sunAltTxt = document.getElementById('sun-alt');
        const moonAltTxt = document.getElementById('moon-alt');
        const guide = document.getElementById('arrow-sun');

        async function boot() {
            document.getElementById('launch').style.display = 'none';
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                document.getElementById('st-gps').innerText = "LOCKED";
                
                // Création d'étoiles de repère
                const starsCont = document.getElementById('stars');
                for(let i=0; i<50; i++) {
                    let s = document.createElement('a-sphere');
                    let az = Math.random() * Math.PI * 2;
                    let al = Math.random() * Math.PI;
                    let x = 100 * Math.cos(al) * Math.sin(az);
                    let y = 100 * Math.sin(al);
                    let z = -100 * Math.cos(al) * Math.cos(az);
                    s.setAttribute('position', `${x} ${y} ${z}`);
                    s.setAttribute('radius', '0.5');
                    s.setAttribute('color', 'white');
                    starsCont.appendChild(s);
                }

                setInterval(() => {
                    const now = new Date();
                    const sun = SunCalc.getPosition(now, lat, lon);
                    const moon = SunCalc.getMoonPosition(now, lat, lon);

                    updateObj('sun', sun.azimuth, sun.altitude, 150);
                    updateObj('moon', moon.azimuth, moon.altitude, 120);

                    sunAltTxt.innerText = Math.round(sun.altitude * 57.29);
                    moonAltTxt.innerText = Math.round(moon.altitude * 57.29);

                    // Aide visuelle pour trouver la lune
                    let mAlt = sun.altitude * 57.29;
                    if (mAlt < 0) {
                        guide.innerHTML = "SOLAIRE: SOUS L'HORIZON<br>TOURNEZ POUR CHERCHER LES ÉTOILES";
                    } else {
                        guide.innerHTML = "CIBLE DÉTECTÉE<br>SCANNEZ LE CIEL";
                    }
                }, 1000);
            });
        }

        function updateObj(id, az, alt, dist) {
            const el = document.getElementById(id);
            const x = dist * Math.cos(alt) * Math.sin(az);
            const y = dist * Math.sin(alt);
            const z = -dist * Math.cos(alt) * Math.cos(az);
            el.setAttribute('position', `${x} ${y} ${z}`);
        }
    </script>
</body>
</html>
