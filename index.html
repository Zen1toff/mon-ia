<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Object Scanner - AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100vw; height: 100vh; }
        #video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.8; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; }
        #start-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; padding: 20px 40px; background: #00ffcc; border: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 20px #00ffcc; }
        #ui { position: fixed; bottom: 30px; width: 100%; z-index: 10; text-align: center; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <button id="start-btn">INITIALISER LE SCANNER AR</button>
    <div id="ui">Placez votre paume face caméra</div>
    
    <video id="video" autoplay playsinline muted></video>

    <script>
        let scene, camera, renderer, sphere, detector;
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');

        async function init() {
            startBtn.style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            // 1. Setup Three.js
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. Création de l'objet 3D (Sphère technologique)
            const geometry = new THREE.IcosahedronGeometry(1, 4);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.5 });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // Ajout de points lumineux sur la sphère
            const pointsGeom = new THREE.PointsGeometry().setFromPoints(geometry.attributes.position.array);
            const pointsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
            const points = new THREE.Points(geometry, pointsMat);
            sphere.add(points);

            camera.position.z = 5;

            // 3. Setup MediaPipe
            detector = await handPoseDetection.createDetector(
                handPoseDetection.SupportedModels.MediaPipeHands, 
                { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands', modelType: 'lite' }
            );

            animate();
        }

        async function animate() {
            const hands = await detector.estimateHands(video);
            
            if (hands && hands.length > 0) {
                const hand = hands[0];
                
                // Coordonnées du centre de la paume (Point 9 : Base du majeur)
                const palmCenter = hand.keypoints[9];
                const wrist = hand.keypoints[0];

                // Conversion 2D vers Espace 3D Three.js
                const x = -(palmCenter.x / video.videoWidth * 10 - 5);
                const y = -(palmCenter.y / video.videoHeight * 10 - 5);
                const z = (hand.keypoints3D[9].z * -10); // Profondeur réelle !

                sphere.position.set(x, y, z);

                // Rotation basée sur l'orientation de la main
                sphere.rotation.x += 0.05;
                sphere.rotation.y += 0.05;

                // Détection POING FERMÉ (Changement d'état)
                const isFist = Math.abs(hand.keypoints[12].y - hand.keypoints[0].y) < 100;
                if (isFist) {
                    sphere.material.color.setHex(0xff0044); // Rouge
                    sphere.scale.set(0.6, 0.6, 0.6);
                } else {
                    sphere.material.color.setHex(0x00ffcc); // Cyan
                    sphere.scale.set(1.2, 1.2, 1.2);
                }
                
                sphere.visible = true;
            } else {
                sphere.visible = false;
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        startBtn.addEventListener('click', init);
    </script>
</body>
</html>
