<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>World Conquest 3D - Ultimate</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #00ffcc; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .panel { background: rgba(0, 20, 40, 0.9); border: 2px solid #00ffcc; padding: 15px; pointer-events: auto; border-radius: 10px; box-shadow: 0 0 15px #00ffcc; }
        .btn { background: #003344; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; cursor: pointer; margin-top: 5px; width: 100%; font-weight: bold; }
        .btn:hover { background: #00ffcc; color: #000; }
        #target-info { position: absolute; top: 10px; right: 10px; width: 250px; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; pointer-events: none; font-size: 24px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>

    <div id="crosshair">+</div>

    <div id="ui">
        <div class="panel">
            <h2 style="margin:0">COMMANDEMENT</h2>
            <hr>
            OR: <span id="gold">1000</span> $<br>
            ARMEE: <span id="units">0</span><br>
            <button class="btn" onclick="buyUnit()">RECRUTER (200$)</button>
            <button class="btn" onclick="buyNuke()">ACHETER NUKE (5000$)</button>
        </div>
    </div>

    <div id="target-info" class="panel">
        <h3 id="country-name">Cible</h3>
        <p>Type: <span id="target-type">Ville</span></p>
        <button class="btn" style="background:#cc0000" onclick="attack()">INVASION</button>
        <button class="btn" style="background:#660000" onclick="nuke()">FRAPPE NUCLÉAIRE</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- INITIALISATION ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LUMIÈRES ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 3, 5);
        scene.add(sun);

        // --- CRÉATION DE LA TERRE ---
        const geometry = new THREE.SphereGeometry(5, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        
        // Texture de secours si le chargement échoue
        const earthMaterial = new THREE.MeshPhongMaterial({
            color: 0x156289,
            emissive: 0x072534,
            side: THREE.DoubleSide,
            flatShading: false,
        });

        // Tentative de chargement de la vraie texture
        textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', 
            (texture) => { earthMaterial.map = texture; earthMaterial.needsUpdate = true; },
            undefined, 
            () => { console.log("Erreur texture - Utilisation du mode bleu"); }
        );

        const earth = new THREE.Mesh(geometry, earthMaterial);
        scene.add(earth);

        // --- AJOUT DE BASES MILITAIRES (POINTS) ---
        const baseGeometry = new THREE.SphereGeometry(0.1, 10, 10);
        const baseMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        function addBase(lat, lon, name) {
            const base = new THREE.Mesh(baseGeometry, baseMaterial);
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            base.position.set(
                -(5.1 * Math.sin(phi) * Math.cos(theta)),
                5.1 * Math.cos(phi),
                5.1 * Math.sin(phi) * Math.sin(theta)
            );
            base.userData = { name: name, type: "Base Militaire" };
            earth.add(base);
        }

        // Ajouter quelques villes/bases
        addBase(48.85, 2.35, "Paris");
        addBase(40.71, -74.00, "New York");
        addBase(35.68, 139.65, "Tokyo");

        // --- SYSTÈME DE SÉLECTION (RAYCASTER) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(earth.children);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                document.getElementById('target-info').style.display = 'block';
                document.getElementById('country-name').innerText = target.userData.name;
                document.getElementById('target-type').innerText = target.userData.type;
            } else {
                document.getElementById('target-info').style.display = 'none';
            }
        });

        // --- CONTRÔLES ---
        camera.position.z = 12;
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if(isDragging) {
                earth.rotation.y += e.movementX * 0.005;
                earth.rotation.x += e.movementY * 0.005;
            }
        });

        // --- GAME LOOP ---
        let gold = 1000;
        let units = 0;

        function animate() {
            requestAnimationFrame(animate);
            gold += 0.1; // Gain d'argent
            document.getElementById('gold').innerText = Math.floor(gold);
            renderer.render(scene, camera);
        }
        animate();

        // --- FONCTIONS DE JEU ---
        window.buyUnit = () => { if(gold >= 200) { gold -= 200; units++; document.getElementById('units').innerText = units; } };
        window.attack = () => { 
            if(units > 0) {
                alert("Attaque lancée sur " + document.getElementById('country-name').innerText);
                units--;
                document.getElementById('units').innerText = units;
            } else {
                alert("Pas assez de troupes !");
            }
        };
    </script>
</body>
</html>
