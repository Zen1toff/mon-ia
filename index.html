<!DOCTYPE html>
<html>
<head>
    <title>Twisto Caen Live</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialisation de la carte
        const map = L.map('map').setView([49.1828, -0.3707], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Récupération des données Twisto
        async function chargerStations() {
            try {
                const response = await fetch("https://data.twisto.fr/api/explore/v2.1/catalog/datasets/gtfs-stops-twisto/records?limit=50");
                const data = await response.json();

                data.results.forEach(station => {
                    if(station.stop_lat && station.stop_lon) {
                        L.marker([station.stop_lat, station.stop_lon])
                         .addTo(map)
                         .bindPopup(`<b>${station.stop_name}</b>`);
                    }
                });
            } catch (err) {
                alert("Erreur de chargement : Vérifie ta connexion internet !");
                console.error(err);
            }
        }

        chargerStations();
    </script>
</body>
</html>
