<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>World Conquest : Renaissance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; height: 100vh; }
        
        /* Menu Latéral */
        #sidebar { width: 300px; background: #2c3e50; padding: 20px; border-right: 2px solid #34495e; }
        .stat-card { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .gold { color: #f1c40f; font-weight: bold; font-size: 1.2em; }

        /* Zone de Jeu */
        #main-map { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .country-card { 
            background: #ecf0f1; color: #2c3e50; margin: 10px; padding: 15px; 
            border-radius: 5px; display: inline-block; width: 250px; vertical-align: top;
        }
        .status-player { border: 4px solid #27ae60; }
        .status-ruin { opacity: 0.7; background: #95a5a6; }

        button { 
            background: #2980b9; color: white; border: none; padding: 8px; 
            cursor: pointer; border-radius: 4px; margin-top: 5px; width: 100%;
        }
        button:hover { background: #3498db; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        .log { font-size: 0.8em; color: #bdc3c7; margin-top: 20px; height: 150px; overflow-y: auto; border-top: 1px solid #7f8c8d; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>🌍 Empire Manager</h2>
        <div class="stat-card">
            Or: <span id="gold-display" class="gold">0</span> $<br>
            Puissance: <span id="power-display">0</span> GW
        </div>
        <div class="stat-card">
            <h3>Armée</h3>
            Soldats: <span id="army-count">0</span><br>
            Nukes: <span id="nuke-count">0</span>
        </div>
        <div id="game-logs" class="log">Bienvenue, Commandant. Choisissez un pays pour restaurer sa base.</div>
    </div>

    <div id="main-map">
        <h1>Carte du Monde (Secteurs)</h1>
        <div id="world-container"></div>
    </div>

<script>
    // --- DONNÉES DU JEU ---
    let player = {
        gold: 1000,
        army: 0,
        nukes: 0,
        power: 0,
        ownedCountries: []
    };

    const countries = [
        { id: 0, name: "France", status: "ruin", cost: 500, goldGen: 50, power: 100 },
        { id: 1, name: "USA", status: "ruin", cost: 2000, goldGen: 200, power: 500 },
        { id: 2, name: "Japon", status: "ruin", cost: 1200, goldGen: 120, power: 300 },
        { id: 3, name: "Brésil", status: "ruin", cost: 800, goldGen: 80, power: 150 },
        { id: 4, name: "Égypte", status: "ruin", cost: 400, goldGen: 40, power: 80 }
    ];

    // --- LOGIQUE ---

    function initGame() {
        const container = document.getElementById('world-container');
        container.innerHTML = '';
        
        countries.forEach(country => {
            const card = document.createElement('div');
            card.className = `country-card status-${country.status}`;
            card.id = `country-${country.id}`;
            
            card.innerHTML = `
                <h3>${country.name}</h3>
                <p>État: ${country.status === 'ruin' ? '🏚️ Ruines' : '🏰 Base Active'}</p>
                <p>Génère: ${country.goldGen}$/sec</p>
                <button onclick="repairBase(${country.id})" id="btn-${country.id}">
                    Restaurer (${country.cost}$)
                </button>
            `;
            container.appendChild(card);
        });
    }

    function repairBase(id) {
        const country = countries[id];
        if (player.gold >= country.cost) {
            player.gold -= country.cost;
            country.status = 'active';
            player.ownedCountries.push(id);
            player.power += country.power;
            
            addLog(`Base restaurée en ${country.name} !`);
            updateUI();
            initGame(); // Rafraîchir la carte
        } else {
            addLog("Pas assez d'or !");
        }
    }

    function addLog(msg) {
        const logBox = document.getElementById('game-logs');
        logBox.innerHTML = `<div>> ${msg}</div>` + logBox.innerHTML;
    }

    function updateUI() {
        document.getElementById('gold-display').innerText = Math.floor(player.gold);
        document.getElementById('power-display').innerText = player.power;
        document.getElementById('army-count').innerText = player.army;
        document.getElementById('nuke-count').innerText = player.nukes;
    }

    // --- BOUCLE DE GÉNÉRATION (Toutes les secondes) ---
    setInterval(() => {
        player.ownedCountries.forEach(id => {
            player.gold += countries[id].goldGen / 10; // Gain passif
        });
        updateUI();
    }, 100); // Mise à jour fluide

    initGame();
    updateUI();
</script>
</body>
</html>
