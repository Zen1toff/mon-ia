<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>AR Hand Shooter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: #00ffcc; z-index: 10; font-family: 'Courier New', monospace; pointer-events: none; }
        video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        canvas { position: fixed; inset: 0; z-index: 1; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid #00ffcc; border-radius: 50%; z-index: 20; }
    </style>
</head>
<body>
    <div id="ui">SYSTÈME D'ARMEMENT PRÊT<br>PLIEZ LE POUCE POUR TIRER</div>
    <div id="crosshair"></div>
    <video id="webcam" playsinline></video>

    <script>
        let scene, camera, renderer, gun, bullet;
        const video = document.getElementById('webcam');
        let canShoot = true;

        // 1. INITIALISATION DU MONDE 3D
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Création de l'arme (Un pistolet laser stylé)
            const gunGroup = new THREE.Group();
            const bodyGeom = new THREE.BoxGeometry(0.2, 0.3, 0.8);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 100 });
            const gunBody = new THREE.Mesh(bodyGeom, bodyMat);
            
            const barrelGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.5);
            const barrelMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc });
            const barrel = new THREE.Mesh(barrelGeom, barrelMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = -0.5;

            gunGroup.add(gunBody);
            gunGroup.add(barrel);
            gun = gunGroup;
            scene.add(gun);

            const light = new THREE.PointLight(0x00ffcc, 1, 100);
            light.position.set(0, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        }

        // 2. DETECTION DES MAINS
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Positionner l'arme sur le poignet (point 0)
                const wrist = hand[0];
                const indexBase = hand[5];
                
                gun.position.x = (0.5 - wrist.x) * 5;
                gun.position.y = (0.5 - wrist.y) * 3;
                gun.position.z = -2;

                // Orienter l'arme vers l'index (point 8)
                gun.lookAt(new THREE.Vector3((0.5 - hand[8].x) * 5, (0.5 - hand[8].y) * 3, -5));

                // DÉTECTION DU TIR (Si le pouce est proche de l'index = Tir)
                const thumbTip = hand[4];
                const indexPinkyBase = hand[17];
                const distThumb = Math.hypot(thumbTip.x - indexBase.x, thumbTip.y - indexBase.y);

                if (distThumb < 0.06 && canShoot) {
                    shootLaser();
                    canShoot = false;
                    setTimeout(() => canShoot = true, 200); // Cadence de tir
                }
            }
        });

        function shootLaser() {
            const laserGeom = new THREE.CylinderGeometry(0.02, 0.02, 2);
            const laserMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
            const laser = new THREE.Mesh(laserGeom, laserMat);
            
            laser.position.copy(gun.position);
            laser.rotation.copy(gun.rotation);
            laser.rotateX(Math.PI / 2);
            scene.add(laser);

            // Animation de la balle
            const start = Date.now();
            const anim = () => {
                laser.translateY(0.5); // Avance vers l'avant de l'arme
                if (Date.now() - start < 1000) requestAnimationFrame(anim);
                else scene.remove(laser);
            };
            anim();
        }

        async function start() {
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            await video.play();

            const loop = async () => {
                await hands.send({image: video});
                renderer.render(scene, camera);
                requestAnimationFrame(loop);
            };
            loop();
        }

        start();
    </script>
</body>
</html>
