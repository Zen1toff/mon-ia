<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Dragon Slot</title>
    <style>
        /* Conseils pour reproduire le style de l'image :
           1. Palette de couleurs : Utilisez des violets sombres, des fuchsias néon et des dorés.
           2. Organisation : Utilisez les Grilles CSS (CSS Grid) pour la grille de jeu et Flexbox pour les bandeaux de statistiques.
           3. Graphismes : Pour un résultat optimal, remplacez les émojis par des fichiers image (.png ou .webp) de haute qualité des symboles.
           4. Polices : Recherchez des polices d'inspiration asiatique pour les jackpots et une police sans empattement claire pour les compteurs. */
        body {
            background-color: #1a0033; /* Violet sombre */
            color: white;
            font-family: 'Montserrat', sans-serif; /* Police claire et moderne */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        /* Style inspiré du mobile-first */
        #game-interface {
            width: 100%;
            max-width: 480px; /* Taille typique mobile */
            background: linear-gradient(180deg, #2d004d, #1a0033);
            border: 3px solid #ff00ff; /* Bordure néon */
            border-radius: 15px;
            display: flex;
            flex-direction: column;
        }
        /* Style simplifié pour la barre de solde */
        .header-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.4);
        }
        .balance-container {
            color: #ffd700; /* Doré */
            font-weight: bold;
        }
        /* Style simplifié pour la grille de jeu */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 colonnes */
            gap: 5px;
            padding: 15px;
            background-color: #0d001a;
            border: 2px solid #5a008a;
        }
        .reel-symbol {
            background-color: #1a0033;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="game-interface">
        <div class="header-bar">
            <div class="balance-container">Solde: <span id="current-balance">100,000</span></div>
            <div>LV. 44</div>
        </div>
        <div class="slot-grid">
            <div class="reel-symbol">🐲</div>
            <div class="reel-symbol">💰</div>
            <div class="reel-symbol">K</div>
            <div class="reel-symbol">J</div>
            </div>
        </div>
</body>
</html>
