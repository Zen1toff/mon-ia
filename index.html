<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Empire Slot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Oswald:wght@500&display=swap');

        :root {
            --neon-purple: #bc13fe;
            --gold: #ffd700;
            --dark-bg: #0b0118;
            --win-color: #00ffcc;
        }

        body {
            background: #000;
            color: white;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LE HUD (INTERFACE) --- */
        #game-view {
            width: 420px;
            height: 850px;
            background: radial-gradient(circle at top, #3a007d 0%, #0b0118 100%);
            border: 4px solid #222;
            border-radius: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.3);
        }

        .top-status {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px 30px 0 0;
        }

        .balance-container {
            color: var(--gold);
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* --- JACKPOTS --- */
        .jackpot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            padding: 10px;
        }

        .jackpot-card {
            background: linear-gradient(145deg, #222, #000);
            border: 1px solid var(--gold);
            text-align: center;
            padding: 5px;
            border-radius: 8px;
        }

        .jackpot-card.grand {
            grid-column: span 2;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
            color: black;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse-gold 2s infinite;
        }

        /* --- LE DRAGON --- */
        .dragon-header {
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        .dragon-img {
            font-size: 120px;
            filter: drop-shadow(0 0 20px var(--gold));
            z-index: 2;
        }

        /* --- MACHINE À SOUS (5 ROULEAUX) --- */
        .slot-machine {
            flex-grow: 1;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reels-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background: rgba(188, 19, 254, 0.1);
            padding: 8px;
            border: 2px solid var(--neon-purple);
            border-radius: 10px;
            width: 100%;
            height: 320px;
        }

        .reel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .symbol {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            transition: transform 0.1s;
        }

        /* --- ANIMATIONS DE GAIN --- */
        .win-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            display: none;
            text-align: center;
        }

        .win-title {
            font-family: 'Goldman', cursive;
            font-size: 4rem;
            color: var(--gold);
            text-shadow: 0 0 20px red, 0 0 40px var(--gold);
            animation: big-win-anim 0.5s ease-out forwards;
        }

        /* --- CONTRÔLES --- */
        .footer-controls {
            padding: 20px;
            background: linear-gradient(0deg, #111, transparent);
        }

        .bet-info {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 50px;
        }

        .spin-btn {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(#ff0055, #aa0033);
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-purple);
            transition: 0.2s;
        }

        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        /* Animations CSS */
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 10px var(--gold); }
            50% { box-shadow: 0 0 25px var(--gold); }
            100% { box-shadow: 0 0 10px var(--gold); }
        }

        @keyframes blur-spin {
            0% { filter: blur(0); transform: translateY(0); }
            50% { filter: blur(10px); transform: translateY(-50px); }
            100% { filter: blur(0); transform: translateY(0); }
        }

        @keyframes big-win-anim {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            80% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .spinning { animation: blur-spin 0.15s infinite; }
    </style>
</head>
<body>

<div id="game-view">
    <div class="top-status">
        <div class="balance-container">💰 <span id="balance">100,000.00</span></div>
        <div style="color: #bc13fe;">LV. 44 ⭐</div>
    </div>

    <div class="jackpot-grid">
        <div class="jackpot-card grand" id="grand-j">GRAND: 2,409,276,000</div>
        <div class="jackpot-card">MAXI: 12,472,000</div>
        <div class="jackpot-card">MAJOR: 741,312,000</div>
    </div>

    <div class="dragon-header">
        <div class="dragon-img">🐉</div>
    </div>

    <div class="slot-machine">
        <div class="reels-container" id="grid">
            <div class="reel" id="r1"></div>
            <div class="reel" id="r2"></div>
            <div class="reel" id="r3"></div>
            <div class="reel" id="r4"></div>
            <div class="reel" id="r5"></div>
        </div>
    </div>

    <div class="win-overlay" id="win-overlay">
        <div class="win-title">BIG WIN!</div>
        <div id="win-amount" style="font-size: 2rem; color: #fff;">+ 0.00</div>
    </div>

    <div class="footer-controls">
        <div class="bet-info">
            <button onclick="changeBet(-100)" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">-</button>
            <div style="text-align: center;">
                <div style="font-size: 0.7rem; color: #aaa;">MISE TOTALE</div>
                <div id="bet-display" style="font-weight: bold; color: var(--gold);">1,000.00</div>
            </div>
            <button onclick="changeBet(100)" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">+</button>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="startSpin()">ARRÊT</button>
    </div>
</div>

<script>
    let balance = 100000.00;
    let currentBet = 1000.00;
    const symbols = ['🐉', '💎', '🧧', '🔱', '💰', '🔥', '7️⃣', '🏮'];
    const reelElements = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3'), document.getElementById('r4'), document.getElementById('r5')];

    // Init
    function init() {
        reelElements.forEach(reel => {
            reel.innerHTML = '';
            for(let i=0; i<4; i++) {
                const s = document.createElement('div');
                s.className = 'symbol';
                s.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                reel.appendChild(s);
            }
        });
    }

    function changeBet(amt) {
        currentBet = Math.max(100, currentBet + amt);
        document.getElementById('bet-display').innerText = currentBet.toLocaleString() + ".00";
    }

    async function startSpin() {
        if (balance < currentBet) return alert("Fonds insuffisants!");

        balance -= currentBet;
        document.getElementById('balance').innerText = balance.toLocaleString();
        document.getElementById('spin-btn').disabled = true;
        document.getElementById('win-overlay').style.display = 'none';

        // Lancer les rouleaux avec décalage
        reelElements.forEach((reel, i) => {
            setTimeout(() => {
                reel.classList.add('spinning');
                
                // Simuler le changement de symboles
                let count = 0;
                let interval = setInterval(() => {
                    reel.querySelectorAll('.symbol').forEach(s => {
                        s.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    });
                    count++;
                    if(count > 20) {
                        clearInterval(interval);
                        reel.classList.remove('spinning');
                        if(i === 4) checkResults();
                    }
                }, 60);
            }, i * 150);
        });
    }

    function checkResults() {
        // Logique de gain simplifiée pour l'exemple (30% de chance)
        const luck = Math.random();
        if (luck > 0.7) {
            const win = currentBet * (Math.floor(Math.random() * 10) + 2);
            balance += win;
            
            // Animation de gain
            const overlay = document.getElementById('win-overlay');
            const amtText = document.getElementById('win-amount');
            amtText.innerText = "+ " + win.toLocaleString();
            overlay.style.display = 'block';
            
            // Son de gain (optionnel)
            // new Audio('win.mp3').play();
        }
        
        document.getElementById('balance').innerText = balance.toLocaleString();
        document.getElementById('spin-btn').disabled = false;
        
        // Mise à jour Jackpot GRAND au hasard
        const jackpot = 2409276000 + Math.floor(Math.random() * 1000);
        document.getElementById('grand-j').innerText = "GRAND: " + jackpot.toLocaleString();
    }

    init();
</script>
</body>
</html>
