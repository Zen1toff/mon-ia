<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>World Conquest 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { 
            position: absolute; background: rgba(0, 20, 40, 0.8); border: 1px solid #00d4ff; 
            color: #00d4ff; padding: 15px; pointer-events: auto;
        }
        #stats { top: 10px; left: 10px; width: 250px; }
        #actions { bottom: 10px; left: 50%; transform: translateX(-50%); width: 600px; display: flex; justify-content: space-around; }
        .btn { background: #004a66; border: 1px solid #00d4ff; color: white; padding: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #00d4ff; color: black; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="stats" class="panel">
            <h2>🌍 EMPIRE STATUS</h2>
            <hr>
            OR: <span id="gold">1000</span> $<br>
            UNITÉS: <span id="units">0</span><br>
            NUKE: <span id="nukes">0</span>
        </div>

        <div id="actions" class="panel">
            <button class="btn" onclick="buyUnit()">ACHETER ARMÉE (200$)</button>
            <button class="btn" onclick="buildNuke()">PROFIL NUCLÉAIRE (5000$)</button>
            <button class="btn" onclick="launchInvasion()">LANCER INVASION</button>
        </div>
    </div>

    <!-- Import de Three.js -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION SCÈNE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LE GLOBE ---
        const geometry = new THREE.SphereGeometry(5, 64, 64);
        const textureLoader = new THREE.TextureLoader();
        
        // Utilisation d'une texture de carte du monde (Remplace par un vrai lien d'image)
        const earthTexture = textureLoader.load('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/2048px-Blue_Marble_2002.png');
        const material = new THREE.MeshPhongMaterial({ map: earthTexture });
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // --- LUMIÈRE ---
        const light = new THREE.PointLight(0xffffff, 1.5);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x333333));

        camera.position.z = 12;

        // --- INTERACTION (SOURIS / ZOOM) ---
        let isDragging = false;
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if(isDragging) {
                earth.rotation.y += e.movementX * 0.005;
                earth.rotation.x += e.movementY * 0.005;
            }
        });

        document.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.01;
            camera.position.z = Math.max(7, Math.min(camera.position.z, 20));
        });

        // --- BOUCLE DE JEU ---
        let gold = 1000;
        function update() {
            gold += 0.5; // Revenu passif
            document.getElementById('gold').innerText = Math.floor(gold);
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        update();

        // --- GESTION DES ARMES ---
        window.buyUnit = () => {
            if(gold >= 200) {
                gold -= 200;
                // Logique pour ajouter des unités visuelles sur la carte
                alert("Unité déployée dans vos bases !");
            }
        };
    </script>
</body>
</html>
