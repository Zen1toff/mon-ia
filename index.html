<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>WARZONE_TACTICAL_HUD v4.0</title>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <style>
        :root { --warzone-green: #00ff41; --danger: #ff0000; --bg-dark: #0a0c0a; }
        body { margin: 0; background: var(--bg-dark); color: var(--warzone-green); font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }

        /* Zones principales */
        #left-recon { width: 300px; border-right: 1px solid #1a331a; display: flex; flex-direction: column; padding: 15px; background: rgba(0,20,0,0.5); }
        #center-stream { flex: 1; position: relative; border: 1px solid #1a331a; }
        #right-comms { width: 340px; border-left: 1px solid #1a331a; background: #050705; display: flex; flex-direction: column; }

        /* Widgets Warzone Style */
        .module { border: 1px solid #1a331a; padding: 12px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .module::before { content: ""; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: var(--warzone-green); }
        .title { font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; opacity: 0.7; }
        .data { font-size: 22px; font-weight: bold; }

        /* Radar Simulation */
        #radar { width: 100%; height: 150px; background: radial-gradient(circle, #1a331a 1px, transparent 1px); background-size: 20px 20px; border: 1px solid #1a331a; position: relative; }
        #radar-line { position: absolute; width: 100%; height: 2px; background: rgba(0,255,65,0.3); top: 0; animation: scan 3s linear infinite; }

        /* Twitch Overlay */
        #setup { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 5px solid var(--warzone-green); }
        input { background: #000; border: 1px solid var(--warzone-green); color: var(--warzone-green); padding: 10px; width: 250px; text-align: center; }
        button { background: var(--warzone-green); color: #000; border: none; padding: 10px 30px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
        .alert-active { background: rgba(255,0,0,0.2) !important; color: white !important; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="setup">
    <h1>WARZONE_UAV_LINK</h1>
    <input type="text" id="streamer-id" placeholder="CHANNEL_NAME_REQUIRED">
    <button onclick="linkSystem()">DEPLOY_HUD</button>
</div>

<div id="left-recon">
    <div class="module">
        <div class="title">COMBAT_INTENSITY</div>
        <div class="data" id="combat-lvl">0%</div>
    </div>
    <div class="module">
        <div class="title">TARGETING_PRECISION</div>
        <div class="data" id="precision">98.2%</div>
    </div>
    <div class="title">RECON_RADAR</div>
    <div id="radar"><div id="radar-line"></div></div>
    <div style="margin-top: auto; font-size: 10px; opacity: 0.5;">F.O.V : 103<br>PING : 24ms<br>INPUT : KB/MOUSE</div>
</div>

<div id="center-stream">
    <div id="twitch-player" style="width:100%; height:100%;"></div>
</div>

<div id="right-comms">
    <div style="padding: 15px; border-bottom: 1px solid #1a331a;">COMMS_FEED (TWITCH)</div>
    <iframe id="chat-embed" width="100%" height="100%" frameborder="0"></iframe>
</div>

<script>
    let mouseMoves = 0;

    function linkSystem() {
        const channel = document.getElementById('streamer-id').value;
        if(!channel) return;
        document.getElementById('setup').style.display = 'none';

        // Charger Stream Warzone
        new Twitch.Player("twitch-player", { 
            channel: channel, 
            width: "100%", 
            height: "100%", 
            parent: ["localhost", "127.0.0.1"] 
        });

        // Charger Chat Comms
        document.getElementById('chat-embed').src = `https://www.twitch.tv/embed/${channel}/chat?parent=localhost&parent=127.0.0.1&darkpopout`;

        // Tracker de combat (Souris/Clavier)
        window.addEventListener('mousemove', () => mouseMoves++);
        window.addEventListener('keydown', () => mouseMoves += 10);

        setInterval(() => {
            let intensity = Math.min(mouseMoves / 2, 100);
            document.getElementById('combat-lvl').innerText = Math.round(intensity) + "%";
            
            // Si l'intensité est haute (combat), on change le look
            if(intensity > 60) {
                document.getElementById('left-recon').classList.add('alert-active');
                document.getElementById('combat-lvl').style.color = "white";
            } else {
                document.getElementById('left-recon').classList.remove('alert-active');
                document.getElementById('combat-lvl').style.color = "#00ff41";
            }
            mouseMoves = 0;
        }, 1000);
    }
</script>
</body>
</html>
