<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Hand AR Cube</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #status { position: fixed; top: 10px; width: 100%; text-align: center; color: #00ffcc; z-index: 10; font-family: monospace; }
        canvas { position: absolute; inset: 0; }
        video { display: none; }
    </style>
</head>
<body>
    <div id="status">INITIALISATION DU MONDE 3D...</div>
    <video id="webcam" playsinline></video>
    
    <script>
        let scene, camera, renderer, cube;
        let isPinching = false;
        const video = document.getElementById('webcam');

        // 1. SCÈNE THREE.JS
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Création du Cube 3D
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.8 });
            cube = new THREE.Mesh(geometry, material);
            cube.position.z = -2; // Placé à 2 mètres devant
            scene.add(cube);

            // Lumière
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        // 2. LOGIQUE DE PINCEMENT (HAND TRACKING)
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const thumb = hand[4];
                const index = hand[8];

                // Calcul distance Pouce-Index
                const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                
                // Si distance faible = Pincement
                if (dist < 0.05) {
                    isPinching = true;
                    cube.material.color.setHex(0xff00ff); // Change de couleur quand on attrape
                    
                    // Déplacement du cube (Conversion coordonnées écran -> 3D)
                    cube.position.x = (0.5 - index.x) * 4;
                    cube.position.y = (0.5 - index.y) * 4;
                } else {
                    isPinching = false;
                    cube.material.color.setHex(0x00ffcc);
                }
                document.getElementById('status').innerText = isPinching ? "CUBE ATTRAPÉ !" : "PINCEZ LE CUBE";
            }
        });

        // 3. LANCEMENT
        async function start() {
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            await video.play();

            const loop = async () => {
                await hands.send({image: video});
                renderer.render(scene, camera);
                requestAnimationFrame(loop);
            };
            loop();
        }

        start();
    </script>
</body>
</html>
