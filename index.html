<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOC AUDIO VISUALIZER</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui-overlay {
            position: fixed; top: 20px; width: 100%; text-align: center;
            color: #ff0000; letter-spacing: 5px; text-shadow: 0 0 10px #ff0000;
            pointer-events: none; font-size: 14px;
        }
        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: #ff0000; color: #000; border: none;
            font-weight: bold; border-radius: 5px; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">AOC TACTICAL AUDIO MONITOR</div>
    <button id="start-btn">ACTIVER MICRO</button>
    <canvas id="visualizer"></canvas>

    <script>
        const btn = document.getElementById('start-btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            initAudio();
        });

        function initAudio() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 64; // Nombre de barres
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);

                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const barWidth = (canvas.width / bufferLength) * 0.8;
                    let barHeight;
                    let x = 0;

                    for (let i = 0; i < bufferLength; i++) {
                        barHeight = dataArray[i] * 2.5;
                        
                        // Couleur Rouge AOC avec dégradé
                        ctx.fillStyle = `rgb(${dataArray[i] + 100}, 0, 0)`;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "#ff0000";
                        
                        // Dessin de la barre
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth + 5;
                    }
                }
                draw();
            }).catch(err => console.error("Erreur Micro:", err));
        }
    </script>
</body>
</html>
