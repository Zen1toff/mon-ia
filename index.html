<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Canvas IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video { position: fixed; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.5; }
        #drawCanvas { position: fixed; top: 0; left: 0; z-index: 5; transform: scaleX(-1); }
        #ui { position: fixed; top: 20px; width: 100%; z-index: 10; display: flex; justify-content: center; gap: 10px; pointer-events: none; }
        .btn { padding: 10px 20px; background: white; border-radius: 20px; font-weight: bold; pointer-events: auto; }
        #start-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; padding: 20px; background: #00ffcc; border: none; border-radius: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <button id="start-btn">LANCER LE TABLEAU MAGIQUE</button>
    
    <div id="ui">
        <div class="btn" id="status">En attente...</div>
        <div class="btn" onclick="clearCanvas()" style="background: #ff4444; color: white;">EFFACER</div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="drawCanvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let detector;
        let lastPos = null;

        async function init() {
            document.getElementById('start-btn').style.display = 'none';
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            detector = await handPoseDetection.createDetector(
                handPoseDetection.SupportedModels.MediaPipeHands, 
                { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands', modelType: 'lite' }
            );

            status.innerText = "Prêt : Pincez pour dessiner !";
            detect();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        async function detect() {
            const hands = await detector.estimateHands(video);

            if (hands && hands.length > 0) {
                const index = hands[0].keypoints[8];
                const thumb = hands[0].keypoints[4];

                // Coordonnées adaptées à l'écran
                const x = (index.x / video.videoWidth) * canvas.width;
                const y = (index.y / video.videoHeight) * canvas.height;

                // Calcul distance pince
                const dist = Math.sqrt(Math.pow(index.x - thumb.x, 2) + Math.pow(index.y - thumb.y, 2));

                if (dist < 45) {
                    status.innerText = "✍️ Dessin en cours...";
                    if (lastPos) {
                        ctx.beginPath();
                        ctx.strokeStyle = "#00ffcc";
                        ctx.lineWidth = 8;
                        ctx.lineCap = "round";
                        ctx.moveTo(lastPos.x, lastPos.y);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    }
                    lastPos = { x, y };
                } else {
                    status.innerText = "✋ Main levée (Déplacement)";
                    lastPos = null;
                }
            }
            requestAnimationFrame(detect);
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
