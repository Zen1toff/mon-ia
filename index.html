<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBIRTH ISLAND WEB | Tactical Warzone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: 'Oswald', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 1px solid #0f0; transform: translate(-50%, -50%); pointer-events: none; }
        
        /* HUD INVENTAIRE */
        #inventory-hud { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .active { border-color: #0f0; box-shadow: 0 0 10px #0f0; }

        #health-container { position: absolute; bottom: 20px; left: 20px; width: 250px; }
        #hp-bar { width: 100%; height: 15px; background: rgba(0,0,0,0.5); border: 1px solid white; }
        #hp-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.3s; }
        
        #map-name { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; letter-spacing: 2px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="map-name">REBIRTH ISLAND - SECTEUR PRISON</div>
    
    <div id="health-container">
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div style="font-size: 12px; margin-top: 5px;">PLAQUES DE BLINDAGE : 100%</div>
    </div>

    <div id="inventory-hud">
        <div id="slot-1" class="slot active">1: ARME</div>
        <div id="slot-2" class="slot">2: HACHE</div>
        <div id="slot-3" class="slot">3: STIM</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x334455); // Ciel brumeux
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(50, 100, 50);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x555555));

        // --- MAP : REBIRTH ISLAND ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x555550 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // PRISON CENTRALE (Bâtiment lourd)
        const prison = new THREE.Mesh(new THREE.BoxGeometry(60, 30, 100), new THREE.MeshStandardMaterial({color: 0x222222}));
        prison.position.set(0, 15, -50);
        scene.add(prison);

        // TOURS DE GUET
        for(let i=0; i<4; i++) {
            const tower = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 40), new THREE.MeshStandardMaterial({color: 0x111111}));
            tower.position.set(i % 2 === 0 ? 80 : -80, 20, i < 2 ? 80 : -80);
            scene.add(tower);
        }

        // --- INVENTAIRE & ARMES ---
        const gunGroup = new THREE.Group();
        const weaponMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
        const axeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1, 0.3), new THREE.MeshStandardMaterial({color: 0x880000}));
        const stimMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.3), new THREE.MeshStandardMaterial({color: 0x00ff00}));
        
        axeMesh.visible = false;
        stimMesh.visible = false;
        
        gunGroup.add(weaponMesh, axeMesh, stimMesh);
        gunGroup.position.set(0.4, -0.4, -0.7);
        camera.add(gunGroup);
        scene.add(camera);

        let currentSlot = 1;
        let hp = 100;
        let speedBoost = 1;

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        window.addEventListener('keydown', (e) => {
            if(e.key === "1") switchSlot(1);
            if(e.key === "2") switchSlot(2);
            if(e.key === "3") switchSlot(3);
        });

        function switchSlot(n) {
            currentSlot = n;
            weaponMesh.visible = (n === 1);
            axeMesh.visible = (n === 2);
            stimMesh.visible = (n === 3);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`slot-${n}`).classList.add('active');
        }

        function useItem() {
            if(currentSlot === 1) { // Tir
                gunGroup.position.z += 0.2; 
            } else if(currentSlot === 2) { // Hache (Mêlée)
                axeMesh.rotation.x -= 1.5;
                setTimeout(() => axeMesh.rotation.x = 0, 200);
            } else if(currentSlot === 3) { // Stimulant
                hp = Math.min(100, hp + 40);
                speedBoost = 1.6;
                stimMesh.position.y -= 0.5; // Animation injection
                document.getElementById('hp-fill').style.width = hp + "%";
                setTimeout(() => { speedBoost = 1; stimMesh.position.y = 0; switchSlot(1); }, 3000);
            }
        }

        document.addEventListener('mousedown', useItem);

        // --- MOUVEMENTS (Simplifiés pour le relief) ---
        let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, sprint = false;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            if(e.code === 'ShiftLeft') sprint = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false;
            if(e.code === 'ShiftLeft') sprint = false;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                let currentSpeed = (sprint ? 90 : 45) * speedBoost;
                
                if(moveF || moveB) velocity.z -= direction.z * currentSpeed * delta;
                if(moveL || moveR) velocity.x -= direction.x * currentSpeed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Inertie Arme
                gunGroup.position.z += (-0.7 - gunGroup.position.z) * 0.1;
                
                // Bobbing (Respiration)
                gunGroup.position.y = -0.4 + Math.sin(Date.now() * 0.005) * 0.01;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
