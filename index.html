<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Morphing Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <style>
        :root { --primary: #00ffcc; --error: #ff4444; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        #status-bar {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; 
            justify-content: center; font-weight: bold; z-index: 101; border-bottom: 2px solid var(--primary);
        }
        .error-mode { border-bottom: 2px solid var(--error) !important; color: var(--error); }

        #overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); text-align: center; }
        #canvas-container { position: fixed; inset: 0; z-index: 1; display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        
        .btn { padding: 18px 35px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; color: #000; cursor: pointer; }
        .step-box { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; width: 280px; }
        .step { opacity: 0.3; margin: 5px 0; font-size: 13px; transition: 0.3s; }
        .active { opacity: 1; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-bar">SCANNER BIOMÉTRIQUE ACTIF</div>

    <div id="overlay">
        <div id="init-ui">
            <h2>MORPHING IA</h2>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button class="btn" onclick="document.getElementById('file-input').click()">1. IMPORTER LE VISAGE</button>
            <br>
            <button id="start-btn" class="btn" style="display:none; background:white; margin-top:20px;">2. LANCER CALIBRATION</button>
        </div>

        <div id="steps-ui" style="display:none;">
            <div class="step-box">
                <div id="s1" class="step active">1. RESTER FACE</div>
                <div id="s2" class="step">2. TOURNER À GAUCHE</div>
                <div id="s3" class="step">3. TOURNER À DROITE</div>
                <div id="s4" class="step">4. LEVER LE MENTON</div>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="output"></canvas>
    </div>
    <video id="webcam" autoplay playsinline muted style="display:none;"></video>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const statusBar = document.getElementById('status-bar');
        
        let targetImg = new Image();
        let targetLandmarks = null;
        let faceMesh;
        let currentStep = 'face'; 
        let progress = 0;

        // --- 1. ANALYSE DE LA PHOTO CIBLE ---
        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                targetImg.onload = async () => {
                    statusBar.innerText = "ANALYSE DE LA PHOTO...";
                    const analyzer = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
                    analyzer.setOptions({ maxNumFaces: 1, refineLandmarks: true });
                    analyzer.onResults((res) => {
                        if (res.multiFaceLandmarks.length > 0) {
                            targetLandmarks = res.multiFaceLandmarks[0];
                            document.getElementById('start-btn').style.display = "inline-block";
                            statusBar.innerText = "PHOTO ANALYSÉE OK";
                        } else {
                            alert("Erreur : Aucun visage trouvé sur la photo !");
                        }
                    });
                    await analyzer.send({image: targetImg});
                };
                targetImg.src = f.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- 2. LOGIQUE DE SWAP PRÉCISE ---
        function drawPreciseSwap(currentLandmarks) {
            ctx.save();
            
            // Création du masque basé sur ton visage en direct
            ctx.beginPath();
            // Liste étendue des points de contour (incluant front et mâchoire)
            const faceContour = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];
            
            ctx.moveTo(currentLandmarks[10].x * canvas.width, currentLandmarks[10].y * canvas.height);
            faceContour.forEach(i => ctx.lineTo(currentLandmarks[i].x * canvas.width, currentLandmarks[i].y * canvas.height));
            ctx.closePath();
            ctx.clip();

            // Calcul de la déformation (Bounding Box dynamique)
            const getBox = (lm, w, h) => {
                const xs = lm.map(p => p.x * w);
                const ys = lm.map(p => p.y * h);
                return { x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xs) - Math.min(...xs), h: Math.max(...ys) - Math.min(...ys) };
            };

            const targetBox = getBox(targetLandmarks, targetImg.width, targetImg.height);
            const currentBox = getBox(currentLandmarks, canvas.width, canvas.height);

            // Dessiner la zone correspondante de la photo sur ton visage
            ctx.drawImage(
                targetImg,
                targetBox.x, targetBox.y, targetBox.w, targetBox.h, // Source (Photo)
                currentBox.x, currentBox.y, currentBox.w, currentBox.h  // Destination (Toi)
            );
            
            ctx.restore();
        }

        // --- 3. INITIALISATION & CALIBRATION ---
        async function startApp() {
            faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });

            faceMesh.onResults((results) => {
                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const points = results.multiFaceLandmarks[0];
                    if (currentStep !== 'done') {
                        updateCalibration(points);
                    } else {
                        document.getElementById('overlay').style.display = 'none';
                        drawPreciseSwap(points);
                    }
                }
                ctx.restore();
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const loop = async () => { await faceMesh.send({image: video}); requestAnimationFrame(loop); };
                loop();
            };
        }

        function updateCalibration(points) {
            const nose = points[1].x;
            const yaw = (nose - points[234].x) / (points[454].x - points[234].x);
            const pitch = (points[1].y - points[10].y) / (points[152].y - points[10].y);

            let success = false;
            if (currentStep === 'face' && yaw > 0.45 && yaw < 0.55) success = true;
            if (currentStep === 'left' && yaw < 0.35) success = true;
            if (currentStep === 'right' && yaw > 0.65) success = true;
            if (currentStep === 'up' && pitch < 0.35) success = true;

            if (success) {
                progress++;
                if (progress > 40) {
                    progress = 0;
                    if (currentStep === 'face') { currentStep = 'left'; activateStep('s2'); }
                    else if (currentStep === 'left') { currentStep = 'right'; activateStep('s3'); }
                    else if (currentStep === 'right') { currentStep = 'up'; activateStep('s4'); }
                    else currentStep = 'done';
                }
            }
        }

        function activateStep(id) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('init-ui').style.display = 'none';
            document.getElementById('steps-ui').style.display = 'block';
            document.getElementById('canvas-container').style.display = 'block';
            startApp();
        };
    </script>
</body>
</html>
