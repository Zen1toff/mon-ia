<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Casino - Real Experience</title>
    <style>
        :root {
            --purple-main: #3b0273;
            --purple-dark: #1a013d;
            --gold: #ffd700;
            --neon-pink: #ff00ff;
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Conteneur principal style Mobile */
        #app {
            width: 400px; height: 750px;
            background: linear-gradient(to bottom, #4b0082, #000);
            border: 4px solid #333; border-radius: 20px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Header : Solde et Niveau */
        .top-bar {
            display: flex; justify-content: space-between; padding: 10px;
            background: rgba(0,0,0,0.5); font-size: 14px;
        }
        .balance { color: var(--gold); }

        /* Jackpots */
        .jackpots {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px;
        }
        .jackpot-item {
            background: rgba(0,0,0,0.6); border: 1px solid var(--gold);
            font-size: 10px; text-align: center; border-radius: 5px; padding: 2px;
        }
        .grand { grid-column: span 2; background: linear-gradient(to right, #b8860b, #ffd700, #b8860b); color: black; font-size: 14px; }

        /* Zone Dragon (Décor) */
        .dragon-area {
            height: 150px; position: relative;
            display: flex; justify-content: center; align-items: flex-end;
        }
        .dragon-emoji { font-size: 100px; filter: drop-shadow(0 0 10px var(--gold)); }

        /* Menu Latéral (Quêtes) */
        .side-menu {
            position: absolute; left: 0; top: 150px; width: 60px;
            background: rgba(123, 0, 255, 0.7); border-radius: 0 15px 15px 0;
            padding: 10px 0; display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        .quest-icon { width: 35px; height: 35px; background: #fff; border-radius: 5px; font-size: 20px; text-align: center; }

        /* Grille de Machine à Sous */
        .slot-container {
            flex-grow: 1; padding: 10px; display: flex; justify-content: center; align-items: center;
        }
        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
            background: rgba(255, 255, 255, 0.1); padding: 5px; border-radius: 5px; width: 100%;
        }
        .reel {
            background: #0d001a; border: 1px solid #444; height: 180px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .symbol {
            min-height: 60px; display: flex; justify-content: center; align-items: center;
            font-size: 30px; border-bottom: 1px solid #222;
        }

        /* Footer : Contrôles */
        .controls {
            background: #220044; padding: 15px; border-top: 3px solid var(--neon-pink);
            text-align: center;
        }
        .win-display { color: var(--gold); font-size: 18px; margin-bottom: 10px; height: 20px; }
        
        .bet-bar {
            display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px;
        }
        .btn-bet { background: #555; border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        
        .spin-btn {
            background: linear-gradient(#ff0000, #800000);
            border: 2px solid white; color: white; width: 80%; padding: 12px;
            border-radius: 25px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #500;
        }
        .spin-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Animations */
        @keyframes blur {
            0% { filter: blur(0); }
            50% { filter: blur(4px); transform: translateY(-20px); }
            100% { filter: blur(0); }
        }
        .spinning { animation: blur 0.1s infinite; }
    </style>
</head>
<body>

<div id="app">
    <div class="top-bar">
        <div class="balance">💰 <span id="balance">100,000.00</span></div>
        <div>LV. 44 ⭐</div>
    </div>

    <div class="jackpots">
        <div class="jackpot-item grand">GRAND: 2,409,276,000</div>
        <div class="jackpot-item">MAXI: 12,472,000</div>
        <div class="jackpot-item">MAJOR: 741,312,000</div>
    </div>

    <div class="side-menu">
        <div class="quest-icon">🤠</div>
        <div class="quest-icon">🎁</div>
        <div class="quest-icon">⚡</div>
    </div>

    <div class="dragon-area">
        <div class="dragon-emoji">🐲</div>
    </div>

    <div class="slot-container">
        <div class="grid" id="main-grid">
            <div class="reel" id="r0"></div>
            <div class="reel" id="r1"></div>
            <div class="reel" id="r2"></div>
            <div class="reel" id="r3"></div>
            <div class="reel" id="r4"></div>
        </div>
    </div>

    <div class="controls">
        <div class="win-display" id="win-text">BONNE CHANCE !</div>
        <div class="bet-bar">
            <button class="btn-bet" onclick="updateBet(-0.25)">-</button>
            <div>MISE: <span id="bet-val">0.75</span></div>
            <button class="btn-bet" onclick="updateBet(0.25)">+</button>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="spin()">ARRÊT</button>
    </div>
</div>

<script>
    let balance = 100000.00;
    let currentBet = 0.75;
    const symbols = ['🐉', '💎', '🧧', '🔱', '💰', '🔥', 'K', 'J', 'Q'];
    const reels = [document.getElementById('r0'), document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3'), document.getElementById('r4')];

    // Remplissage initial
    function init() {
        reels.forEach(r => {
            for(let i=0; i<3; i++) {
                let div = document.createElement('div');
                div.className = 'symbol';
                div.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                r.appendChild(div);
            }
        });
    }

    function updateBet(amount) {
        currentBet = Math.max(0.75, currentBet + amount);
        document.getElementById('bet-val').innerText = currentBet.toFixed(2);
    }

    function spin() {
        if (balance < currentBet) return alert("Solde insuffisant !");
        
        balance -= currentBet;
        document.getElementById('balance').innerText = balance.toLocaleString();
        document.getElementById('win-text').innerText = "Tourne...";
        document.getElementById('spin-btn').disabled = true;

        reels.forEach((r, i) => {
            setTimeout(() => {
                r.classList.add('spinning');
                let count = 0;
                let timer = setInterval(() => {
                    r.innerHTML = '';
                    for(let j=0; j<3; j++) {
                        let div = document.createElement('div');
                        div.className = 'symbol';
                        div.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                        r.appendChild(div);
                    }
                    count++;
                    if(count > 15) {
                        clearInterval(timer);
                        r.classList.remove('spinning');
                        if(i === 4) endSpin();
                    }
                }, 50);
            }, i * 100);
        });
    }

    function endSpin() {
        document.getElementById('spin-btn').disabled = false;
        // Calcul de gain aléatoire (Simulé)
        let winChance = Math.random();
        if(winChance > 0.7) {
            let win = currentBet * (Math.floor(Math.random() * 5) + 2);
            balance += win;
            document.getElementById('win-text').innerText = "GAIN: " + win.toFixed(2) + " !";
            document.getElementById('balance').innerText = balance.toLocaleString();
        } else {
            document.getElementById('win-text').innerText = "ESSAYE ENCORE !";
        }
    }

    init();
</script>

</body>
</html>
