<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Silhouette Changer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #121212; font-family: sans-serif; color: white; }
        
        /* Menu de départ */
        #menu {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); text-align: center; padding: 20px;
        }
        
        #preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin: 20px; display: none; border: 2px solid #00ffcc; }
        
        .btn {
            padding: 15px 30px; background: #00ffcc; color: black;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 10px;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #video-hidden { display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>CAMÉLÉON IA</h1>
        <p>Remplace ta silhouette par n'importe quelle image</p>
        
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <button class="btn" onclick="document.getElementById('file-input').click()">1. IMPORTER UNE IMAGE</button>
        
        <img id="preview-img" alt="Aperçu">
        
        <button id="start-btn" class="btn" style="background: #555; pointer-events: none;">2. LANCER LE DIRECT</button>
    </div>

    <div id="canvas-container">
        <canvas id="output-canvas"></canvas>
    </div>
    
    <video id="video-hidden" autoplay playsinline></video>

    <script>
        const video = document.getElementById('video-hidden');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const startBtn = document.getElementById('start-btn');
        let selectedImg = new Image();

        // 1. Gérer l'importation de l'image
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = "block";
                    selectedImg.src = event.target.result;
                    startBtn.style.background = "#00ffcc";
                    startBtn.style.pointerEvents = "auto";
                };
                reader.readAsDataURL(file);
            }
        };

        // 2. Initialiser MediaPipe Selfie Segmentation
        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });

        selfieSegmentation.setOptions({ modelSelection: 1 }); // 1 pour plus de précision

        selfieSegmentation.onResults((results) => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessiner le masque de la personne
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);

            // Mode "Source-In" : On ne dessine l'image QUE là où se trouve la personne
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(selectedImg, 0, 0, canvas.width, canvas.height);

            // Mode "Destination-Over" : On dessine la vidéo originale derrière tout ça
            ctx.globalCompositeOperation = 'destination-over';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            ctx.restore();
        });

        // 3. Lancer la caméra
        startBtn.onclick = async () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = stream;

            // Boucle de traitement
            async function process() {
                await selfieSegmentation.send({ image: video });
                requestAnimationFrame(process);
            }
            process();
        };
    </script>
</body>
</html>
