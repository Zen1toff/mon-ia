<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sideswipe 3D Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #gui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 24px; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); user-select: none; }
    </style>
</head>
<body>

<div id="gui">SCORE: <span id="s1">0</span> - <span id="s2">0</span></div>
<div id="controls">
    <div class="btn" id="btn-left">←</div>
    <div class="btn" id="btn-jump">JUMP</div>
    <div class="btn" id="btn-boost" style="background: orange;">BOOST</div>
    <div class="btn" id="btn-right">→</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
/** --- INITIALISATION PHYSIQUE (CANNON.JS) --- **/
const world = new CANNON.World();
world.gravity.set(0, -15, 0); // Gravité Sideswipe

/** --- INITIALISATION RENDU (THREE.JS) --- **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x111122);
document.body.appendChild(renderer.domElement);

// Lumières
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
scene.add(sun);

/** --- LE TERRAIN (STADE) --- **/
const arenaSize = { w: 60, h: 30, d: 2 };
const groundMat = new THREE.MeshPhongMaterial({ color: 0x228822, emissive: 0x001100 });
const groundGeo = new THREE.BoxGeometry(arenaSize.w, 1, arenaSize.d);
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
scene.add(groundMesh);

const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(30, 0.5, 1)) });
world.addBody(groundBody);

/** --- LA BALLE 3D --- **/
const ballRadius = 1.5;
const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
const ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 100 });
const ballMesh = new THREE.Mesh(ballGeo, ballMat);
scene.add(ballMesh);

const ballBody = new CANNON.Body({
    mass: 1,
    shape: new CANNON.Sphere(ballRadius),
    material: new CANNON.Material({ restitution: 0.9 }) // Rebond Sideswipe
});
ballBody.position.set(0, 10, 0);
world.addBody(ballBody);

/** --- LA VOITURE --- **/
const carGeo = new THREE.BoxGeometry(3, 1.2, 1.8);
const carMat = new THREE.MeshPhongMaterial({ color: 0x0077ff });
const carMesh = new THREE.Mesh(carGeo, carMat);
scene.add(carMesh);

const carBody = new CANNON.Body({
    mass: 2,
    shape: new CANNON.Box(new CANNON.Vec3(1.5, 0.6, 0.9))
});
carBody.position.set(-15, 2, 0);
world.addBody(carBody);

/** --- CONTRÔLES --- **/
const input = { left: false, right: false, boost: false };
document.getElementById('btn-left').ontouchstart = () => input.left = true;
document.getElementById('btn-left').ontouchend = () => input.left = false;
document.getElementById('btn-right').ontouchstart = () => input.right = true;
document.getElementById('btn-right').ontouchend = () => input.right = false;
document.getElementById('btn-boost').ontouchstart = () => input.boost = true;
document.getElementById('btn-boost').ontouchend = () => input.boost = false;
document.getElementById('btn-jump').onclick = () => {
    carBody.applyImpulse(new CANNON.Vec3(0, 15, 0), carBody.position);
};

/** --- BOUCLE DE JEU --- **/
camera.position.z = 25;
camera.position.y = 8;

function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);

    // Mouvement voiture
    if(input.left) carBody.velocity.x = -15;
    else if(input.right) carBody.velocity.x = 15;
    else carBody.velocity.x *= 0.95;

    if(input.boost) {
        carBody.applyForce(new CANNON.Vec3(input.right ? 40 : -40, 20, 0), carBody.position);
    }

    // Stabilisation (empêcher la voiture de sortir du plan Z)
    carBody.position.z = 0;
    ballBody.position.z = 0;

    // Sync Three.js avec Cannon.js
    carMesh.position.copy(carBody.position);
    carMesh.quaternion.copy(carBody.quaternion);
    ballMesh.position.copy(ballBody.position);
    ballMesh.quaternion.copy(ballBody.quaternion);

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
