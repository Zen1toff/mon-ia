<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Rocket Sideswipe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 3px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui"><h1>Score: <span id="s1">0</span> - <span id="s2">0</span></h1></div>
<div id="controls">
    <div id="joystick" class="btn">DIR</div>
    <div id="boost" class="btn">BOOST</div>
</div>

<script>
// --- CONFIGURATION MATTER.JS ---
const { Engine, Render, Runner, Bodies, Composite, Body, Vector } = Matter;
const engine = Engine.create();
const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#1a1a2e' }
});

// --- ÉLÉMENTS DU JEU ---
const w = window.innerWidth;
const h = window.innerHeight;

// Murs et Sol
const ground = Bodies.rectangle(w/2, h, w, 60, { isStatic: true, render: { fillStyle: '#333' } });
const ceiling = Bodies.rectangle(w/2, 0, w, 60, { isStatic: true });
const leftWall = Bodies.rectangle(0, h/2, 60, h, { isStatic: true });
const rightWall = Bodies.rectangle(w, h/2, 60, h, { isStatic: true });

// La Voiture (un rectangle bleu)
const car = Bodies.rectangle(200, h-100, 60, 30, { 
    friction: 0.5, 
    restitution: 0.1,
    render: { fillStyle: '#00d2ff' } 
});

// Le Ballon
const ball = Bodies.circle(w/2, h/2, 30, { 
    restitution: 0.8, 
    friction: 0.05,
    render: { fillStyle: '#ffffff' } 
});

Composite.add(engine.world, [ground, ceiling, leftWall, rightWall, car, ball]);

// --- COMMANDES TACTILES ---
let isBoosting = false;
let joystickDir = { x: 0, y: 0 };

document.getElementById('boost').addEventListener('touchstart', () => isBoosting = true);
document.getElementById('boost').addEventListener('touchend', () => isBoosting = false);

document.getElementById('joystick').addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    const rect = e.target.getBoundingClientRect();
    joystickDir.x = (touch.clientX - (rect.left + 35)) / 35;
    joystickDir.y = (touch.clientY - (rect.top + 35)) / 35;
});
document.getElementById('joystick').addEventListener('touchend', () => {
    joystickDir = { x: 0, y: 0 };
});

// --- BOUCLE DE MISE À JOUR ---
Matter.Events.on(engine, 'beforeUpdate', () => {
    // Gravité allégée pour la voiture quand elle vole
    if (Math.abs(joystickDir.y) > 0.1 || isBoosting) {
        Body.applyForce(car, car.position, { x: 0, y: -0.0015 });
    }

    // Direction (Joystick)
    if (Math.abs(joystickDir.x) > 0.1) {
        Body.setVelocity(car, { x: joystickDir.x * 5, y: car.velocity.y });
    }

    // Boost
    if (isBoosting) {
        const angle = car.angle;
        Body.applyForce(car, car.position, { 
            x: Math.cos(angle) * 0.02, 
            y: Math.sin(angle) * 0.02 
        });
    }

    // Garder la voiture droite (auto-redressement)
    Body.setAngle(car, car.angle * 0.95);
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// Redimensionnement
window.addEventListener('resize', () => {
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;
});
</script>
</body>
</html>
