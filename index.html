<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte Twisto - Caen</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialiser la carte sur Caen
        const map = L.map('map').setView([49.1828, -0.3707], 13);

        // 2. Ajouter le fond de carte (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Exemple : Ajouter un marqueur pour la station "Bernières"
        const bernieres = L.marker([49.1824, -0.3589]).addTo(map);
        bernieres.bindPopup("<b>Station Bernières</b><br>Chargement des temps Twisto...");
    </script>
</body>
</html>
