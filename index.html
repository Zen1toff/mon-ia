<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ASTRO_RECON // LIVE_FEED</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #hud-data {
            position: fixed; bottom: 20px; left: 20px; color: #00ff41;
            font-family: monospace; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px;
            border-left: 3px solid #00ff41;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="hud-data">
        > GPS_LINK: ACTIVE<br>
        > TARGET: MOON_PHASE_0.8<br>
        > ORIENTATION: <span id="deg">0</span>°
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-sphere id="moon" 
                  material="src: https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/space/moon_1024.jpg;"
                  radius="5"
                  position="0 20 -50"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            <a-text value="MOON // DIST: 384,400 KM" align="center" position="0 -7 0" color="#00ff41"></a-text>
        </a-sphere>

        <a-sphere id="sun" 
                  color="yellow" 
                  radius="10" 
                  position="100 50 100"
                  material="shader: flat; fog: false">
            <a-light type="point" intensity="2" distance="1000"></a-light>
        </a-sphere>

        <a-camera gps-camera rotation-reader></a-camera>

    </a-scene>

    <script>
        // On récupère l'angle de rotation pour le HUD
        window.addEventListener('deviceorientation', (event) => {
            document.getElementById('deg').innerText = Math.round(event.alpha);
        });

        // Ici, on pourrait ajouter une API comme 'SunCalc' 
        // pour positionner la lune et le soleil dynamiquement
    </script>
</body>
</html>
