<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Blox 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* UI - Joystick */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border-radius: 50%; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: white;
            border-radius: 50%; opacity: 0.8;
        }

        /* UI - Bouton Sauter */
        #jump-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 70px; height: 70px; background: rgba(255,255,255,0.5);
            border: 4px solid white; border-radius: 50%;
            color: white; font-weight: bold; display: flex;
            align-items: center; justify-content: center;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="jump-btn">SAUT</div>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

// --- INITIALISATION ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Ciel bleu
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lumières
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7.5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// Sol (Herbe)
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshStandardMaterial({ color: 0x44aa44 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// --- PERSONNAGE (Style Roblox) ---
const playerGroup = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), new THREE.MeshStandardMaterial({color: 0x3366ff}));
const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xffdbac}));
head.position.y = 1.1;
playerGroup.add(body, head);
playerGroup.position.y = 0.75;
scene.add(playerGroup);

// --- LOGIQUE CAMERA & MOUVEMENT ---
let moveForward = 0, moveSide = 0;
let playerYVel = 0;
let isGrounded = true;
let cameraAngleX = 0;
let cameraAngleY = 0;

// Joystick Logic
const knob = document.getElementById('joystick-knob');
const container = document.getElementById('joystick-container');
container.addEventListener('touchmove', (e) => {
    const rect = container.getBoundingClientRect();
    const touch = e.touches[0];
    const dx = touch.clientX - (rect.left + rect.width/2);
    const dy = touch.clientY - (rect.top + rect.height/2);
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
    const angle = Math.atan2(dy, dx);
    
    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    moveForward = -Math.sin(angle) * (dist/50);
    moveSide = Math.cos(angle) * (dist/50);
});
container.addEventListener('touchend', () => {
    knob.style.transform = `translate(0,0)`;
    moveForward = 0; moveSide = 0;
});

// Tourner l'écran (Caméra)
let lastTouchX = 0, lastTouchY = 0;
window.addEventListener('touchmove', (e) => {
    if (e.target.tagName === 'CANVAS') {
        const touch = e.touches[0];
        if (lastTouchX !== 0) {
            cameraAngleY -= (touch.clientX - lastTouchX) * 0.005;
            cameraAngleX -= (touch.clientY - lastTouchY) * 0.005;
            cameraAngleX = Math.max(-0.5, Math.min(0.5, cameraAngleX)); // Limite haut/bas
        }
        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;
    }
}, {passive: false});
window.addEventListener('touchend', () => { lastTouchX = 0; });

// Saut
document.getElementById('jump-btn').addEventListener('touchstart', () => {
    if (isGrounded) { playerYVel = 0.15; isGrounded = false; }
});

// --- BOUCLE DE JEU ---
function animate() {
    requestAnimationFrame(animate);

    // Gravité
    playerGroup.position.y += playerYVel;
    if (playerGroup.position.y > 0.75) {
        playerYVel -= 0.008;
        isGrounded = false;
    } else {
        playerGroup.position.y = 0.75;
        playerYVel = 0;
        isGrounded = true;
    }

    // Déplacement relatif à la caméra
    playerGroup.rotation.y = cameraAngleY;
    playerGroup.translateZ(moveForward * 0.1);
    playerGroup.translateX(moveSide * 0.1);

    // Caméra suit le joueur
    const camDist = 5;
    camera.position.x = playerGroup.position.x - Math.sin(cameraAngleY) * camDist;
    camera.position.z = playerGroup.position.z - Math.cos(cameraAngleY) * camDist;
    camera.position.y = playerGroup.position.y + 2 + (cameraAngleX * 5);
    camera.lookAt(playerGroup.position);

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
