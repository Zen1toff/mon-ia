<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Web Effects Pro - Montage IA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

<div class="app-container">
    <aside class="toolbar">
        <button onclick="applyEffect('sepia')">Sépia</button>
        <button onclick="applyEffect('invert')">Inverser</button>
        <button onclick="applyEffect('matrix')">Mode Matrix</button>
        <div class="divider"></div>
        <input type="file" id="uploader" accept="video/*">
    </aside>

    <main class="preview-area">
        <div class="monitor">
            <video id="player" controls></video>
            <canvas id="effect-overlay"></canvas>
        </div>
        
        <div class="timeline">
            <div class="playhead"></div>
            <div class="track">Piste Vidéo 1</div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
