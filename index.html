<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>UNO 3D Hand Interaction</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #info { position: fixed; top: 10px; width: 100%; text-align: center; color: #ff0044; z-index: 10; font-weight: bold; text-shadow: 0 0 5px #000; }
        video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: -1; opacity: 0.5; }
        canvas { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="info">UNO 3D : GAUCHE = PAQUET | DROITE = PRENDRE</div>
    <video id="webcam" playsinline></video>

    <script>
        let scene, camera, renderer, deck, activeCard;
        const video = document.getElementById('webcam');
        let isHolding = false;

        // 1. INITIALISATION DU MONDE UNO
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Création du Paquet de cartes (Main Gauche)
            const deckGeom = new THREE.BoxGeometry(0.4, 0.05, 0.6);
            const deckMat = new THREE.MeshPhongMaterial({ color: 0xff0000 }); // Dos rouge UNO
            deck = new THREE.Mesh(deckGeom, deckMat);
            scene.add(deck);

            // Carte active (Celle qu'on pioche)
            const cardGeom = new THREE.PlaneGeometry(0.35, 0.55);
            const cardMat = new THREE.MeshPhongMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
            activeCard = new THREE.Mesh(cardGeom, cardMat);
            activeCard.visible = false;
            scene.add(activeCard);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 2, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            camera.position.z = 3;
        }

        // 2. LOGIQUE DES DEUX MAINS (MediaPipe)
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandEntries) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const label = results.multiHandEntries[index].label; // "Left" ou "Right"
                    
                    // MAIN GAUCHE : On ancre le paquet sur la paume (point 0)
                    if (label === "Left") {
                        deck.position.x = (0.5 - landmarks[0].x) * 5;
                        deck.position.y = (0.5 - landmarks[0].y) * 3;
                        deck.position.z = -landmarks[0].z * 10;
                    }

                    // MAIN DROITE : On vérifie le pincement pour piocher
                    if (label === "Right") {
                        const thumb = landmarks[4];
                        const indexF = landmarks[8];
                        const dist = Math.hypot(thumb.x - indexF.x, thumb.y - indexF.y);

                        if (dist < 0.05) { // PINCH !
                            isHolding = true;
                            activeCard.visible = true;
                            // La carte suit les doigts
                            activeCard.position.x = (0.5 - indexF.x) * 5;
                            activeCard.position.y = (0.5 - indexF.y) * 3;
                            activeCard.rotation.z = Math.atan2(thumb.y - indexF.y, thumb.x - indexF.x);
                        } else {
                            if (isHolding) {
                                // On "lâche" la carte : elle s'envole vers le centre
                                isHolding = false;
                                playCardAnimation();
                            }
                        }
                    }
                });
            }
        });

        function playCardAnimation() {
            // Animation simple pour envoyer la carte au milieu
            const targetPos = new THREE.Vector3(0, 0, -2);
            const animatePlay = () => {
                activeCard.position.lerp(targetPos, 0.1);
                if (activeCard.position.distanceTo(targetPos) > 0.1) {
                    requestAnimationFrame(animatePlay);
                } else {
                    activeCard.visible = false; // La carte est jouée
                }
            };
            animatePlay();
        }

        async function start() {
            init3D();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            await video.play();

            const loop = async () => {
                await hands.send({image: video});
                renderer.render(scene, camera);
                requestAnimationFrame(loop);
            };
            loop();
        }

        start();
    </script>
</body>
</html>
