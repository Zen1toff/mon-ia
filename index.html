<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 Interface Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ps5-container">
        <div class="bg-overlay"></div>
        
        <header class="top-menu">
            <nav>
                <span class="active">Juegos</span>
                <span>Multimedia</span>
            </nav>
            <div class="top-icons">
                <i class="search-icon">🔍</i>
                <i class="settings-icon">⚙️</i>
                <div class="user-avatar"></div>
                <div class="clock" id="clock">18:45</div>
            </div>
        </header>

        <main class="game-shelf">
            <div class="game-card active" data-bg="https://images.alphacoders.com/110/1101980.jpg">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a5/Spider-Man_Miles_Morales_crested.png" alt="Spider-Man">
            </div>
            <div class="game-card" data-bg="https://images7.alphacoders.com/109/1097827.jpg">
                <img src="https://upload.wikimedia.org/wikipedia/en/b/b1/Horizon_Forbidden_West_cover_art.jpg" alt="Horizon">
            </div>
            <div class="game-card" data-bg="https://images2.alphacoders.com/114/1140320.jpg">
                <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/Ratchet_%26_Clank_Rift_Apart_cover_art.jpg" alt="Ratchet">
            </div>
            <div class="game-card" data-bg="https://images5.alphacoders.com/112/1126601.png">
                <img src="https://upload.wikimedia.org/wikipedia/en/e/e0/Demon%27s_Souls_2020_cover_art.jpg" alt="Demons Souls">
            </div>
            <div class="game-card more">
                <div class="plus-icon">➕</div>
            </div>
        </main>

        <section class="game-info">
            <h1 id="game-title">Marvel's Spider-Man: Miles Morales</h1>
            <div class="buttons">
                <button class="btn-play">Jugar</button>
                <button class="btn-more">...</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
