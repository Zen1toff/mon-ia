<!DOCTYPE html>
<html>
<head>
    <title>PS5 Mouse Control</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; }
        .btn { 
            width: 200px; height: 200px; border-radius: 50%; 
            background: #003087; color: white; border: none;
            font-size: 20px; cursor: pointer; margin-top: 50px;
            box-shadow: 0 0 20px #0072ce;
        }
    </style>
</head>
<body>
    <h1>Contrôleur USB PS5</h1>
    <button class="btn" onclick="moveRight()">DÉPLACER À DROITE</button>

    <script>
        async function moveRight() {
            console.log("Envoi de la commande : Droite");
            // Ici, on ajoute la logique pour envoyer "R" (Right) 
            // via Bluetooth à ton adaptateur USB branché sur la console
            if (deviceConnected) {
                await characteristic.writeValue(new TextEncoder().encode("R"));
            } else {
                alert("Connecte ton adaptateur USB d'abord !");
            }
        }
    </script>
</body>
</html>
