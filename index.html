<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Canvas Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; position: fixed; width: 100vw; height: 100vh; }
        #video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.6; }
        #drawCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; }
        #ui { position: fixed; top: 10px; width: 100%; z-index: 10; text-align: center; pointer-events: none; }
        .info { background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; display: inline-block; }
        #start-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; padding: 20px; background: #00ffcc; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="start-btn">ACTIVER LE DESSIN</button>
    <div id="ui"><div class="info" id="status">En attente...</div></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="drawCanvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let detector;
        let lastPos = null;

        async function init() {
            document.getElementById('start-btn').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            // Ajustement précis du canvas
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            detector = await handPoseDetection.createDetector(
                handPoseDetection.SupportedModels.MediaPipeHands, 
                { runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands', modelType: 'lite' }
            );
            status.innerText = "IA PRÊTE : PINCEZ FORT !";
            detect();
        }

        async function detect() {
            const hands = await detector.estimateHands(video);
            // On efface pas le canvas de dessin, mais on pourrait effacer un curseur temporaire ici
            
            if (hands && hands.length > 0) {
                const hand = hands[0];
                const index = hand.keypoints[8];
                const thumb = hand.keypoints[4];

                // CALCUL DES COORDONNÉES (Correction miroir incluse)
                const x = window.innerWidth - (index.x / video.videoWidth * window.innerWidth);
                const y = (index.y / video.videoHeight * window.innerHeight);

                // CALCUL DE LA PINCE (Distance entre pouce et index)
                const dist = Math.sqrt(Math.pow(index.x - thumb.x, 2) + Math.pow(index.y - thumb.y, 2));

                // TEST DE DÉBOGAGE : Si dist < 60 (on augmente la tolérance)
                if (dist < 60) { 
                    status.innerText = "DESSIN EN COURS...";
                    status.style.background = "red";
                    
                    if (lastPos) {
                        ctx.beginPath();
                        ctx.strokeStyle = "#00ffcc";
                        ctx.lineWidth = 10;
                        ctx.lineCap = "round";
                        ctx.lineJoin = "round";
                        ctx.moveTo(lastPos.x, lastPos.y);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    }
                    lastPos = { x, y };
                } else {
                    status.innerText = "PAS DE PINCE (Dist: " + Math.round(dist) + ")";
                    status.style.background = "rgba(0,0,0,0.8)";
                    lastPos = null;
                }
            }
            requestAnimationFrame(detect);
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
