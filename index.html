<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Wireframe IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    
    <style>
        :root { --neon: #00ffcc; --error: #ff4444; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Barre d'erreur / État */
        #status-bar {
            position: fixed; top: 0; width: 100%; height: 45px;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; 
            justify-content: center; font-weight: bold; z-index: 100;
            border-bottom: 2px solid var(--neon); transition: 0.3s;
        }
        .error-active { background: var(--error) !important; border-bottom: 2px solid white !important; }

        /* Écran de chargement */
        #loader {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 200;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #222;
            border-top: 5px solid var(--neon); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Rendu */
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        video { display: none; }
    </style>
</head>
<body>

    <div id="status-bar">INITIALISATION DE L'IA...</div>

    <div id="loader">
        <div class="spinner"></div>
        <p>Chargement des modèles de la main...</p>
    </div>

    <canvas id="output"></canvas>
    <video id="webcam" playsinline></video>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const statusBar = document.getElementById('status-bar');
        const loader = document.getElementById('loader');

        function handleError(msg) {
            statusBar.innerText = "ERREUR : " + msg;
            statusBar.classList.add('error-active');
            loader.style.display = "none";
        }

        async function startTracking() {
            // 1. Initialiser le modèle Hands
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            // 2. Définir le dessin du Wireframe
            hands.onResults((results) => {
                // Cacher le loader dès la première détection réussie
                loader.style.display = "none";
                statusBar.innerText = results.multiHandLandmarks.length > 0 ? "MAINS DÉTECTÉES" : "PRÉSENTEZ VOS MAINS";

                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Dessiner la vidéo en fond (optionnel, enlève si tu veux juste le noir)
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

                if (results.multiHandLandmarks) {
                    for (const landmarks of results.multiHandLandmarks) {
                        // Dessiner les connexions (Wireframe)
                        drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00ffcc', lineWidth: 4});
                        // Dessiner les points (Landmarks)
                        drawLandmarks(ctx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 3});
                    }
                }
                ctx.restore();
            });

            // 3. Lancer la caméra
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                await video.play();

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const sendToIA = async () => {
                    await hands.send({image: video});
                    requestAnimationFrame(sendToIA);
                };
                sendToIA();

            } catch (err) {
                handleError("Accès caméra refusé");
            }
        }

        // Vérifier si le navigateur supporte l'IA
        if (window.navigator.mediaDevices) {
            startTracking();
        } else {
            handleError("Navigateur non compatible");
        }
    </script>
</body>
</html>
