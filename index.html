<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FaceSwap IA - Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <style>
        :root { --accent: #00ffcc; --error: #ff4444; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Barre de statut */
        #status-bar {
            position: fixed; top: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; 
            justify-content: center; font-size: 14px; z-index: 110; transition: 0.3s;
        }
        .error-mode { background: var(--error) !important; font-weight: bold; }

        /* Menu et Chargement */
        #overlay { 
            position: fixed; inset: 0; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #111; padding: 20px; text-align: center;
        }
        
        .loader {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; display: none; margin: 20px;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; display: none; }
        canvas { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        
        .btn { 
            padding: 18px 35px; background: var(--accent); border: none; 
            border-radius: 50px; font-weight: bold; color: #000; font-size: 1rem;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="status-bar">En attente d'une photo...</div>

    <div id="overlay">
        <div id="loader" class="loader"></div>
        <div id="ui-content">
            <h1 style="color: var(--accent);">FACE SWAP PRO</h1>
            <p>Chargez une photo de visage pour commencer</p>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button class="btn" onclick="document.getElementById('file-input').click()">1. CHOISIR UNE PHOTO</button>
            <br>
            <button id="start-btn" class="btn" style="display:none; background:white; margin-top:20px;">2. LANCER LE SWAP</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="output"></canvas>
    </div>
    
    <video id="webcam" autoplay playsinline muted style="display:none;"></video>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const statusBar = document.getElementById('status-bar');
        const loader = document.getElementById('loader');
        const uiContent = document.getElementById('ui-content');
        const overlay = document.getElementById('overlay');
        
        let targetImg = new Image();
        let faceMesh;

        function updateStatus(msg, isError = false) {
            statusBar.innerText = msg;
            if(isError) statusBar.classList.add('error-mode');
            else statusBar.classList.remove('error-mode');
        }

        // 1. IMPORT IMAGE
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                targetImg.onload = () => {
                    document.getElementById('start-btn').style.display = "inline-block";
                    updateStatus("Photo prête !");
                };
                targetImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // 2. INITIALISATION IA
        async function initIA() {
            faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            
            faceMesh.onResults((results) => {
                // On cache l'écran de chargement dès le premier résultat
                if (overlay.style.display !== 'none') {
                    overlay.style.display = 'none';
                    document.getElementById('canvas-container').style.display = 'block';
                }

                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const points = results.multiFaceLandmarks[0];
                    
                    // Création du masque de découpe (Ovale du visage)
                    ctx.beginPath();
                    // On suit les points de contour du visage
                    ctx.moveTo(points[10].x * canvas.width, points[10].y * canvas.height);
                    for(let i=0; i<points.length; i+=5) {
                        ctx.lineTo(points[i].x * canvas.width, points[i].y * canvas.height);
                    }
                    ctx.closePath();
                    ctx.clip();

                    // On dessine la photo importée DANS le masque
                    ctx.drawImage(targetImg, 0, 0, canvas.width, canvas.height);
                    updateStatus("SYNC ACTIVE ✨");
                } else {
                    updateStatus("RECHERCHE DE VISAGE...");
                }
                ctx.restore();
            });
        }

        // 3. LANCEMENT
        document.getElementById('start-btn').onclick = async () => {
            uiContent.style.display = "none";
            loader.style.display = "block";
            updateStatus("Téléchargement de l'IA (veuillez patienter)...");

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = stream;

                await initIA();

                video.onloadedmetadata = async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // Boucle infinie
                    const run = async () => {
                        if (video.readyState >= 2) {
                            await faceMesh.send({image: video});
                        }
                        requestAnimationFrame(run);
                    };
                    run();
                };
            } catch (err) {
                updateStatus("ERREUR CAMÉRA : " + err.message, true);
                loader.style.display = "none";
                uiContent.style.display = "block";
            }
        };
    </script>
</body>
</html>
